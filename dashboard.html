<script>
    // Configuration Supabase
    const _supabase = supabase.createClient("https://xkyynzbbatglctgdtqyu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhreXluemJiYXRnbGN0Z2R0cXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDI0NDEsImV4cCI6MjA5MjIxODQ0MX0.yUJc7P2zkYCb1ub2IPwKPUM1duIaVwGsBmfa4TVIvPc");
    const LIEN_VIDEO = "https://www.youtube.com/watch?v=9uPybhkqYw4";
    let chrono;

    // --- CHARGEMENT INITIAL ---
    window.onload = function() {
        const step = localStorage.getItem('lf_step');
        // Si l'utilisateur est en plein chrono, on le relance
        if (step === 'youtube') { 
            checkChronoPersistence(); 
        } 
        // Si l'utilisateur a déjà fini, on affiche le bouton Victory directement
        else if (step === 'victory') { 
            showStep('step-victory'); 
        }
    };

    function showStep(id) {
        document.getElementById('step-registration').classList.add('hidden');
        document.getElementById('step-youtube').classList.add('hidden');
        document.getElementById('step-victory').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // --- LOGIQUE INSCRIPTION ---
    async function sinscrire() {
        const user = document.getElementById('username').value.trim();
        const parrain = document.getElementById('ref_code').value;
        
        if(!user) return alert("Veuillez entrer un pseudo.");

        const { error } = await _supabase.from('users').insert([{ 
            username: user, 
            email: document.getElementById('email').value, 
            referred_by: parrain 
        }]);

        if (!error) {
            localStorage.setItem('lf_parrain', parrain); // Sauvegarde cruciale pour Victory
            localStorage.setItem('lf_step', 'wait');
            showStep('step-youtube');
            // Délai de sécurité pour lire le message stratégique avant le bouton vidéo
            setTimeout(() => { 
                document.getElementById('btn-video').classList.remove('hidden'); 
            }, 10000);
        } else { 
            alert("Erreur : Ce pseudo est peut-être déjà utilisé."); 
        }
    }

    // --- LOGIQUE YOUTUBE & CHRONO ---
    function handleYoutube() {
        window.open(LIEN_VIDEO, "_blank");
        localStorage.setItem('lf_start_time', Date.now());
        localStorage.setItem('lf_step', 'youtube');
        startChronoLogic();
    }

    function startChronoLogic() {
        showStep('step-youtube');
        document.getElementById('btn-video').classList.add('hidden');
        document.getElementById('timer-display').classList.remove('hidden');

        chrono = setInterval(() => {
            const now = Date.now();
            const start = localStorage.getItem('lf_start_time');
            const elapsed = Math.floor((now - start) / 1000);
            const timeLeft = 180 - elapsed;

            if (timeLeft <= 0) {
                clearInterval(chrono);
                localStorage.setItem('lf_step', 'victory');
                showStep('step-victory');
            } else {
                document.getElementById('timer-display').innerText = timeLeft + "s";
            }
        }, 1000);
    }

    function checkChronoPersistence() {
        const start = localStorage.getItem('lf_start_time');
        if (start) {
            const elapsed = Math.floor((Date.now() - start) / 1000);
            if (elapsed < 180) {
                startChronoLogic();
            } else {
                localStorage.setItem('lf_step', 'victory');
                showStep('step-victory');
            }
        }
    }

    // --- REDIRECTION VICTORY (CORRECTIF DNS) ---
    function openVictory() {
        const parrain = localStorage.getItem('lf_parrain') || "okoningana";
        // On construit l'URL avec HTTPS forcé pour éviter "Adresse introuvable"
        const finalUrl = "https://victory-automatic.com/register/" + parrain.trim();
        
        // Redirection directe dans le même onglet (plus fiable sur mobile)
        window.location.href = finalUrl;
    }

    // --- DECONNEXION / RESET ---
    function logout() {
        if(confirm("Voulez-vous vraiment recommencer ?")) {
            localStorage.clear();
            window.location.reload();
        }
    }

    function toggleLogin() {
        const u = prompt("Entrez votre pseudo :");
        if(u) { 
            localStorage.setItem('lf_step', 'victory'); 
            localStorage.setItem('lf_parrain', 'okoningana');
            showStep('step-victory'); 
        }
    }
</script>
