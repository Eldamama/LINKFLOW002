<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINK FLOW - Officiel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: #f8f9fa; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 420px; margin: 20px auto; text-align: center; }
        
        /* LOGO LINKFLOW */
        .logo-flow { 
            width: 70px; height: 70px; background: var(--primary); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 15px; font-size: 35px; font-weight: bold; box-shadow: 0 4px 10px rgba(26,115,232,0.3);
        }

        h2 { color: #333; margin: 0 0 5px 0; letter-spacing: 1px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; 
            border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn { 
            width: 100%; padding: 16px; border-radius: 10px; border: none; 
            font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s;
            display: block; text-decoration: none; margin-top: 10px; box-sizing: border-box;
        }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; margin: 20px 0; }
        .btn-dark { background: #222; color: white; }
        .btn-success { background: var(--success); color: white; display: none; margin-top: 25px; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .msg-error { background: #fff5f5; color: var(--danger); padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: none; border: 1px solid #fed7d7; }
        #generatorSection, #actionsSection, #btnDeconnect, #resultBox, .video-container { display: none; }
        #status { font-size: 12px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-flow">⚡</div>
        <h2>LINK FLOW</h2>
        <p class="subtitle">Propulsez votre réseau Victory</p>
        
        <div id="status">Chargement...</div>
        <div id="lockMessage" class="msg-error">⚠️ Accès restreint : Parrainage LinkFlow requis.</div>

        <div id="authSection">
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="mdpInput" placeholder="Mot de passe">
            <button class="btn btn-blue" onclick="connecter()">SE CONNECTER</button>
        </div>

        <div id="generatorSection">
            <input type="text" id="v_link_input" placeholder="Lien Victory Automatic ici...">
            <button id="btnGenerate" class="btn btn-blue" onclick="generateLink()">GÉNÉRER MON LIEN LINKFLOW</button>
            <div id="resultBox" style="margin-top:15px; background:#f0fff4; padding:15px; border-radius:10px; border: 1px solid #cdf0d5;">
                <p style="font-size:11px; color:#2f855a; margin:0;">Votre lien viral :</p>
                <code id="displayLink" style="font-weight:bold; color:var(--danger); word-break:break-all;"></code>
            </div>
        </div>

        <div id="actionsSection">
            <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">
            <p style="font-size:14px; color:#444;"><strong>Étape 1 :</strong> Cliquez et interagissez</p>
            <a href="https://www.youtube.com/watch?v=9uPybhkqYw4" target="_blank" class="btn btn-red" onclick="marquerInteraction()">🔴 AGIR SUR YOUTUBE</a>
            
            <p style="font-size:14px; color:#444;"><strong>Étape 2 :</strong> Regardez la vidéo ici</p>
            <div class="video-container" id="videoBox" style="display:block; position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px;">
                <div id="player" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
            </div>
            
            <button class="btn btn-dark" style="margin-top:20px;" onclick="verifierAcces()">VÉRIFIER L'ACCÈS</button>
        </div>

        <a id="dynamicFinalLink" href="#" target="_blank" class="btn btn-success">🚀 S'INSCRIRE AVEC MON PARRAIN</a>

        <button id="btnDeconnect" style="background:none; border:none; color:#aaa; width:100%; margin-top:30px; font-size:12px;" onclick="deconnecter()">DÉCONNEXION</button>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
            authDomain: "linkflow-7a82a.firebaseapp.com",
            databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "linkflow-7a82a",
            storageBucket: "linkflow-7a82a.firebasestorage.app",
            messagingSenderId: "459654757296",
            appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475"
        };
        firebase.initializeApp(firebaseConfig);

        let videoTerminee = false;
        let interactionFaite = false;

        function connecter() {
            const e = document.getElementById("emailInput").value.trim();
            const m = document.getElementById("mdpInput").value;
            firebase.auth().signInWithEmailAndPassword(e, m).catch(err => alert(err.message));
        }

        function deconnecter() { firebase.auth().signOut().then(() => location.reload()); }

        firebase.auth().onAuthStateChanged(user => {
            const status = document.getElementById("status");
            if (user) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("generatorSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "block";
                document.getElementById("btnDeconnect").style.display = "block";
                status.innerText = "Connecté : " + user.email;
                checkAccess(user.email);
            } else {
                document.getElementById("authSection").style.display = "block";
                status.innerText = "Session expirée. Connectez-vous.";
            }
        });

        function checkAccess(email) {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref');
            const btnGen = document.getElementById("btnGenerate");
            const lock = document.getElementById("lockMessage");

            if (email === "lobongoaime@gmail.com") {
                if(!ref) document.getElementById("dynamicFinalLink").href = "https://victoryautomatic.com/user/register/okoningana";
                return;
            }

            if (!ref) {
                btnGen.disabled = true; btnGen.style.opacity = "0.3"; lock.style.display = "block";
            } else {
                document.getElementById("dynamicFinalLink").href = "https://victoryautomatic.com/user/register/" + ref;
            }
        }

        function generateLink() {
            const val = document.getElementById("v_link_input").value.trim();
            if(val.includes('victoryautomatic.com/user/register/')) {
                const pseudo = val.split('/').filter(Boolean).pop();
                document.getElementById("displayLink").innerText = window.location.origin + window.location.pathname + "?ref=" + pseudo;
                document.getElementById("resultBox").style.display = "block";
            } else { alert("Collez votre lien d'inscription Victory complet !"); }
        }

        function marquerInteraction() { interactionFaite = true; }

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '9uPybhkqYw4',
                events: { 'onStateChange': function(e) { if(e.data === YT.PlayerState.ENDED) videoTerminee = true; } }
            });
        }

        function verifierAcces() {
            // Sécurité assouplie : Si l'utilisateur a cliqué sur le bouton rouge, on considère qu'il a agi.
            if (interactionFaite) {
                document.getElementById("actionsSection").style.display = "none";
                document.getElementById("dynamicFinalLink").style.display = "block";
            } else {
                alert("Cliquez d'abord sur le bouton rouge 'AGIR SUR YOUTUBE' !");
            }
        }
    </script>
</body>
</html>
