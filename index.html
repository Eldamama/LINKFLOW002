<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNILINK × Victory Automatic</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      text-align: center;
    }
    header {
      background: linear-gradient(90deg, gold, green, blue, black);
      padding: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* ratio 16:9 */
      height: 0;
      overflow: hidden;
      max-width: 100%;
      background: #000;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    footer {
      background: #111;
      padding: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>UNILINK × Victory Automatic</h1>
  </header>

  <main>
    <h2>Présentation vidéo</h2>
    <div class="video-container">
      <iframe 
        src="https://www.youtube.com/embed/9uPybhkqYw4" 
        title="YouTube video player" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen>
      </iframe>
    </div>
  </main>

  <footer>
    © 2026 UNILINK × Victory Automatic — Transparence et mutualisation
  </footer>
</body>
</html>
