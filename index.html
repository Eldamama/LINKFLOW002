<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKFLOW - Inscription</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #0ea5e9; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #0284c7; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 Inscription LINKFLOW</h2>
    <p>Rejoins la matrice racine</p>
    <input type="text" id="username" placeholder="Nom d'utilisateur">
    <input type="email" id="email" placeholder="Ton Email">
    <input type="text" id="ref_code" placeholder="Code de parrainage" readonly>
    <button class="btn" onclick="sinscrire()">S'INSCRIRE MAINTENANT</button>
</div>

<script>
    const _supabase = supabase.createClient("https://xkyynzbbatglctgdtqyu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhreXluemJiYXRnbGN0Z2R0cXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDI0NDEsImV4cCI6MjA5MjIxODQ0MX0.yUJc7P2zkYCb1ub2IPwKPUM1duIaVwGsBmfa4TVIvPc");

    // Récupérer le code ref dans l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const parrain = urlParams.get('ref') || "okoningana";
    document.getElementById('ref_code').value = parrain;

    async function sinscrire() {
        const user = document.getElementById('username').value.trim();
        const mail = document.getElementById('email').value.trim();
        const ref = document.getElementById('ref_code').value;

        if(!user || !mail) { alert("Remplis tout !"); return; }

        const { error } = await _supabase.from('users').insert([{ 
            username: user, 
            email: mail, 
            referred_by: ref,
            ref_code: user.toLowerCase().replace(/\s/g, '') // Crée un code auto
        }]);

        if (error) {
            alert("Erreur ou email déjà utilisé.");
        } else {
            alert("Inscription réussie ! Direction YouTube pour activer ton lien.");
            // REDIRECTION VERS YOUTUBE
            window.location.href = "https://www.youtube.com/watch?v=9uPybhkqYw4";
        }
    }
</script>
</body>
</html>
