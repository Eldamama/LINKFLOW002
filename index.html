<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINK FLOW - Auth & Vidéo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f9f9f9;
    }
    form {
      margin-bottom: 20px;
      padding: 15px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #player {
      margin-top: 20px;
    }
    #message {
      margin-top: 20px;
      padding: 10px;
      background: #e9f5ff;
      border: 1px solid #007bff;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Bienvenue sur LINK FLOW</h1>

  <!-- Sélecteur de langue -->
  <label for="lang-select">Choisir la langue :</label>
  <select id="lang-select">
    <option value="fr">Français</option>
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="pt">Português</option>
    <option value="ln">Lingala</option>
    <option value="sw">Swahili</option>
  </select>

  <!-- Formulaire d'inscription -->
  <form id="signup-form">
    <h2>Inscription</h2>
    <label>Email :</label>
    <input type="email" id="signup-email" required />
    <label>Mot de passe :</label>
    <input type="password" id="signup-password" required />
    <button type="submit">S'inscrire</button>
  </form>

  <!-- Formulaire de connexion -->
  <form id="login-form">
    <h2>Connexion</h2>
    <label>Email :</label>
    <input type="email" id="login-email" required />
    <label>Mot de passe :</label>
    <input type="password" id="login-password" required />
    <button type="submit">Se connecter</button>
  </form>

  <!-- Bouton de déconnexion -->
  <button id="logout-btn">Se déconnecter</button>

  <!-- Message multilingue -->
  <div id="message"></div>

  <!-- Vidéo YouTube -->
  <div id="player"></div>

  <script>
    // ✅ Supabase client avec ton vrai projet et ta clé anon publishable
    const supabaseClient = supabase.createClient(
      "https://xkyynzbbatglctgdtqyu.supabase.co",
      "sb_publishable_pcrDzFZ9rkilVIw12_0uvw_2CcdtvLB"
    );

    // Dictionnaire multilingue
    const translations = {
      fr: "Pour accéder à la plateforme, vous devez regarder la vidéo, liker et commenter. Cela aide notre communauté à grandir.",
      en: "To access the platform, you must watch the video, like and comment. This helps our community grow.",
      es: "Para acceder a la plataforma, debes ver el video, dar me gusta y comentar. Esto ayuda a que nuestra comunidad crezca.",
      pt: "Para acessar a plataforma, você deve assistir ao vídeo, curtir e comentar. Isso ajuda nossa comunidade a crescer.",
      ln: "Pona kozwa accès na plateforme, tala vidéo, pesa like mpe commenter. Ekosalisa communauté na biso ekola.",
      sw: "Ili kupata ufikiaji wa jukwaa, lazima utazame video, upende na utoe maoni. Hii inasaidia jamii yetu kukua."
    };

    // Affichage message selon langue
    const langSelect = document.getElementById("lang-select");
    const messageBox = document.getElementById("message");

    function updateMessage() {
      const lang = langSelect.value;
      messageBox.textContent = translations[lang];
    }

    langSelect.addEventListener("change", updateMessage);
    updateMessage(); // initial

    // Gestion inscription
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("signup-email").value;
      const password = document.getElementById("signup-password").value;
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) {
        alert("Erreur inscription: " + error.message);
      } else {
        alert("Inscription réussie, vérifie ton email !");
      }
    });

    // Gestion connexion
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        alert("Erreur connexion: " + error.message);
      } else {
        alert("Connexion réussie !");
      }
    });

    // Gestion déconnexion
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      alert("Déconnecté !");
    });

    // ✅ YouTube Player avec ton vrai ID
    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: "9uPybhkqYw4", // ID de ta vidéo YouTube
        events: {
          onReady: () => console.log("Vidéo prête"),
          onStateChange: (event) => console.log("État vidéo:", event.data)
        }
      });
    }
  </script>
</body>
</html>
