<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LINK FLOW - Authentification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Inscription</h2>
    <form id="signup-form">
      <label for="username">Pseudo</label>
      <input type="text" id="username" placeholder="Votre pseudo" required>

      <label for="signup-email">Adresse e‑mail</label>
      <input type="email" id="signup-email" placeholder="exemple@mail.com" required>

      <label for="signup-password">Mot de passe</label>
      <input type="password" id="signup-password" placeholder="••••••••" required>

      <button type="submit">S’inscrire</button>
    </form>

    <h2>Connexion</h2>
    <form id="login-form">
      <label for="login-email">Adresse e‑mail</label>
      <input type="email" id="login-email" required>

      <label for="login-password">Mot de passe</label>
      <input type="password" id="login-password" required>

      <button type="submit">Se connecter</button>
    </form>

    <button id="logout-btn">Déconnexion</button>
    <button id="forgot-btn">Mot de passe oublié</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
