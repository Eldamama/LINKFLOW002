<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LINK FLOW - Authentification</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    #videoOnboarding, #actionsSection, #linkSection {
      display: none;
      margin-top: 20px;
    }
    #linkSection a {
      color: blue;
      font-weight: bold;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Bienvenue sur LINK FLOW</h1>
  <p>Authentification avec Firebase</p>

  <!-- Formulaire d'inscription -->
  <h2>Inscription</h2>
  <input type="email" id="emailInscription" placeholder="Votre email">
  <input type="password" id="mdpInscription" placeholder="Votre mot de passe">
  <button onclick="inscrire()">S’inscrire</button>

  <!-- Formulaire de connexion -->
  <h2>Connexion</h2>
  <input type="email" id="emailConnexion" placeholder="Votre email">
  <input type="password" id="mdpConnexion" placeholder="Votre mot de passe">
  <button onclick="connecter()">Se connecter</button>

  <!-- Bouton de déconnexion -->
  <h2>Déconnexion</h2>
  <button onclick="deconnecter()">Se déconnecter</button>

  <!-- Vidéo -->
  <h2>Visionnez la vidéo pour débloquer les actions</h2>
  <video id="videoOnboarding" width="320" height="240" controls>
    <source src="video.mp4" type="video/mp4">
    Votre navigateur ne supporte pas la vidéo.
  </video>

  <!-- Actions Like & Comment -->
  <div id="actionsSection">
    <button id="likeBtn">👍 Liker</button>
    <button id="commentBtn">💬 Commenter</button>
  </div>

  <!-- Lien caché -->
  <div id="linkSection">
    <p>Bravo, vous avez terminé la vidéo et interagi !</p>
    <a href="https://tonlien.com" target="_blank">Accéder au lien</a>
  </div>

  <script>
    // Config Firebase
    var firebaseConfig = {
      apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
      authDomain: "linkflow-7a82a.firebaseapp.com",
      databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "linkflow-7a82a",
      storageBucket: "linkflow-7a82a.firebasestorage.app",
      messagingSenderId: "459654757296",
      appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475",
      measurementId: "G-THW9XMEJTX"
    };
    firebase.initializeApp(firebaseConfig);

    // Inscription
    function inscrire() {
      const email = document.getElementById("emailInscription").value;
      const mdp = document.getElementById("mdpInscription").value;
      firebase.auth().createUserWithEmailAndPassword(email, mdp)
        .then(u => alert("Inscription réussie : " + u.user.email))
        .catch(e => alert("Erreur : " + e.message));
    }

    // Connexion
    function connecter() {
      const email = document.getElementById("emailConnexion").value;
      const mdp = document.getElementById("mdpConnexion").value;
      firebase.auth().signInWithEmailAndPassword(email, mdp)
        .then(u => alert("Connexion réussie : " + u.user.email))
        .catch(e => alert("Erreur : " + e.message));
    }

    // Déconnexion
    function deconnecter() {
      firebase.auth().signOut()
        .then(() => alert("Déconnexion réussie"))
        .catch(e => alert("Erreur : " + e.message));
    }

    // Surveiller état utilisateur
    firebase.auth().onAuthStateChanged(utilisateur => {
      if (utilisateur) {
        document.getElementById("videoOnboarding").style.display = "block";
      } else {
        document.getElementById("videoOnboarding").style.display = "none";
        document.getElementById("actionsSection").style.display = "none";
        document.getElementById("linkSection").style.display = "none";
      }
    });

    // Débloquer les boutons après vidéo
    const video = document.getElementById("videoOnboarding");
    let liked = false;
    let commented = false;

    video.addEventListener("ended", () => {
      document.getElementById("actionsSection").style.display = "block";
    });

    document.getElementById("likeBtn").addEventListener("click", () => {
      liked = true;
      checkUnlock();
    });

    document.getElementById("commentBtn").addEventListener("click", () => {
      commented = true;
      checkUnlock();
    });

    function checkUnlock() {
      if (liked && commented) {
        document.getElementById("linkSection").style.display = "block";
      }
    }
  </script>
</body>
</html>
