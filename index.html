<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LINK FLOW - Authentification</title>
  <!-- Import Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <h1>Bienvenue sur LINK FLOW</h1>
  <p>Authentification avec Firebase</p>

  <!-- Formulaire d'inscription -->
  <h2>Inscription</h2>
  <input type="email" id="emailInscription" placeholder="Votre email">
  <input type="password" id="mdpInscription" placeholder="Votre mot de passe">
  <button onclick="inscrire()">S’inscrire</button>

  <!-- Formulaire de connexion -->
  <h2>Connexion</h2>
  <input type="email" id="emailConnexion" placeholder="Votre email">
  <input type="password" id="mdpConnexion" placeholder="Votre mot de passe">
  <button onclick="connecter()">Se connecter</button>

  <!-- Bouton de déconnexion -->
  <h2>Déconnexion</h2>
  <button onclick="deconnecter()">Se déconnecter</button>

  <script>
    // Configuration Firebase (remplace par tes propres clés)
    var firebaseConfig = {
      apiKey: "TON_API_KEY",
      authDomain: "TON_PROJET.firebaseapp.com",
      projectId: "TON_PROJET",
      storageBucket: "TON_PROJET.appspot.com",
      messagingSenderId: "TON_SENDER_ID",
      appId: "TON_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    // Fonction inscription
    function inscrire() {
      const email = document.getElementById("emailInscription").value;
      const mdp = document.getElementById("mdpInscription").value;

      firebase.auth().createUserWithEmailAndPassword(email, mdp)
        .then(utilisateur => {
          alert("Inscription réussie : " + utilisateur.user.email);
        })
        .catch(erreur => {
          alert("Erreur : " + erreur.message);
        });
    }

    // Fonction connexion
    function connecter() {
      const email = document.getElementById("emailConnexion").value;
      const mdp = document.getElementById("mdpConnexion").value;

      firebase.auth().signInWithEmailAndPassword(email, mdp)
        .then(utilisateur => {
          alert("Connexion réussie : " + utilisateur.user.email);
        })
        .catch(erreur => {
          alert("Erreur : " + erreur.message);
        });
    }

    // Fonction déconnexion
    function deconnecter() {
      firebase.auth().signOut()
        .then(() => {
          alert("Déconnexion réussie");
        })
        .catch(erreur => {
          alert("Erreur : " + erreur.message);
        });
    }

    // Surveiller l’état de l’utilisateur
    firebase.auth().onAuthStateChanged(utilisateur => {
      if (utilisateur) {
        console.log("Utilisateur connecté :", utilisateur.email);
      } else {
        console.log("Aucun utilisateur connecté");
      }
    });
  </script>
</body>
</html>
