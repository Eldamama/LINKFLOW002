<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKFLOW - Activation</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 420px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #0ea5e9; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; font-size: 16px; text-transform: uppercase; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        .hidden { display: none; }

        /* MESSAGE : NOIR / JAUNE / ROUGE VERTICAL */
        .msg-container {
            background-color: black; color: #fbbf24;
            border-left: 8px solid #ef4444; border-right: 8px solid #ef4444;
            padding: 20px; border-radius: 8px; margin: 20px 0; text-align: left;
            animation: blink-border-vert 0.7s infinite alternate;
        }
        @keyframes blink-border-vert {
            from { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.6); }
            to { border-color: transparent; }
        }
        #timer-display { font-size: 3.5em; font-weight: bold; color: #fbbf24; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="step-registration">
        <h2>🔗 Inscription LINKFLOW</h2>
        <input type="text" id="username" placeholder="Pseudo">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="ref_code" value="okoningana" readonly style="opacity: 0.6;">
        <button class="btn" id="btn-reg" onclick="sinscrire()">S'INSCRIRE MAINTENANT</button>
    </div>

    <div id="step-youtube" class="hidden">
        <div class="msg-container">
            <h3 style="color: #ef4444; margin-top: 0;">🔥 ACTION REQUISE 🔥</h3>
            <p>Interagissez avec la vidéo pour propulser le système.</p>
            <p style="font-size: 0.9em; font-style: italic;">Une vidéo virale = nouveaux adhérents pour VOUS !</p>
        </div>
        <button id="btn-video" class="btn hidden" onclick="handleYoutube()" style="background: #ef4444;">VOIR LA VIDÉO ET DÉMARRER</button>
        <div id="timer-display" class="hidden">180s</div>
    </div>

    <div id="step-victory" class="hidden">
        <h3 style="color: #22c55e;">✅ SOUTIEN TERMINÉ</h3>
        <button class="btn" onclick="openVictory()" style="background: #16a34a;">J'OBTIENS MON LIEN VICTORY</button>
        <input type="text" id="victory-link-input" placeholder="Collez votre lien Victory ici" style="margin-top:20px;">
        <button class="btn" onclick="activerMonLien()">ACTIVER MON SYSTÈME</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient("https://xkyynzbbatglctgdtqyu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhreXluemJiYXRnbGN0Z2R0cXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDI0NDEsImV4cCI6MjA5MjIxODQ0MX0.yUJc7P2zkYCb1ub2IPwKPUM1duIaVwGsBmfa4TVIvPc");
    const LIEN_VIDEO = "https://www.youtube.com/watch?v=9uPybhkqYw4";
    let chrono;

    window.onload = function() {
        const step = localStorage.getItem('lf_step');
        if (step === 'youtube') {
            checkChronoPersistence();
        } else if (step === 'victory') {
            showStep('step-victory');
        }
    };

    function showStep(id) {
        document.getElementById('step-registration').classList.add('hidden');
        document.getElementById('step-youtube').classList.add('hidden');
        document.getElementById('step-victory').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    async function sinscrire() {
        const user = document.getElementById('username').value.trim();
        if(!user) return alert("Pseudo requis");
        const { error } = await _supabase.from('users').insert([{ username: user, email: document.getElementById('email').value, referred_by: document.getElementById('ref_code').value, ref_code: "TEMP_" + user }]);

        if (!error) {
            localStorage.setItem('lf_step', 'wait');
            showStep('step-youtube');
            setTimeout(() => { document.getElementById('btn-video').classList.remove('hidden'); }, 10000);
        } else { alert("Pseudo déjà pris ou erreur réseau."); }
    }

    function handleYoutube() {
        window.open(LIEN_VIDEO, "_blank");
        const startTime = Date.now();
        localStorage.setItem('lf_start_time', startTime);
        localStorage.setItem('lf_step', 'youtube');
        startChronoLogic();
    }

    function startChronoLogic() {
        showStep('step-youtube');
        document.getElementById('btn-video').disabled = true;
        document.getElementById('btn-video').innerText = "Vidéo en cours...";
        document.getElementById('timer-display').classList.remove('hidden');

        chrono = setInterval(() => {
            const now = Date.now();
            const start = localStorage.getItem('lf_start_time');
            const elapsed = Math.floor((now - start) / 1000);
            const timeLeft = 180 - elapsed;

            if (timeLeft <= 0) {
                clearInterval(chrono);
                localStorage.setItem('lf_step', 'victory');
                showStep('step-victory');
            } else {
                document.getElementById('timer-display').innerText = timeLeft + "s";
            }
        }, 1000);
    }

    function checkChronoPersistence() {
        const start = localStorage.getItem('lf_start_time');
        if (start) {
            const now = Date.now();
            const elapsed = Math.floor((now - start) / 1000);
            if (elapsed < 180) {
                startChronoLogic();
            } else {
                localStorage.setItem('lf_step', 'victory');
                showStep('step-victory');
            }
        }
    }

    function openVictory() { window.open(`https://victory-automatic.com/register/${document.getElementById('ref_code').value}`, "_blank"); }
    function activerMonLien() { alert("Système activé !"); }
</script>
</body>
</html>
