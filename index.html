<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKFLOW - Global</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .logo { width: 100px; height: auto; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; background: #334155; color: white; border: 1px solid #38bdf8; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #0ea5e9; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        .hidden { display: none; }
        .status-active { color: #10b981; font-weight: bold; }
        #toast { position: fixed; top: 20px; background: #0ea5e9; padding: 10px 20px; border-radius: 8px; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <img src="logo.jpg" alt="LINKFLOW" class="logo">
    
    <select id="langSelect" onchange="changeLang()">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="sw">Swahili</option>
        <option value="ln">Lingala</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
    </select>

    <div id="step-registration">
        <h1 id="t-title">🔗 Inscription LINKFLOW</h1>
        <p id="t-subtitle" style="color: #94a3b8; font-size: 0.9em;">Rejoins la matrice racine</p>
        <input type="text" id="username" placeholder="Nom d'utilisateur">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="ref_code" readonly style="color: #38bdf8; font-weight: bold;">
        <button class="btn" id="t-btn" onclick="sinscrire()">S'INSCRIRE MAINTENANT</button>
    </div>

    <div id="step-youtube" class="hidden">
        <h1 id="t-step2">📺 Soutien Organique</h1>
        <p>Regardez la vidéo pour activer votre accès</p>
        <button class="btn" id="btn-video" onclick="handleYoutube()">VOIR LA VIDÉO (3 min)</button>
        <p id="countdown" style="font-size: 1.2em; margin-top: 10px; color: #38bdf8;"></p>
    </div>

    <div id="step-victory" class="hidden">
        <h1>✅ Étape Finale</h1>
        <button class="btn" onclick="openVictory()">S'INSCRIRE SUR VICTORY</button>
        
        <div id="final-setup" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155;">
            <p style="font-size: 0.8em; color: #94a3b8;">Collez votre LIEN Victory complet ici :</p>
            <input type="text" id="victory-link-input" placeholder="https://victory-automatic.com/...">
            <button class="btn" style="background: #10b981;" onclick="activerMonLien()">ACTIVER MON SYSTÈME</button>
        </div>
    </div>

    <div id="step-share" class="hidden">
        <h1 style="color: #10b981;">🚀 SYSTÈME ACTIF</h1>
        <p>Partagez votre lien personnalisé :</p>
        <button class="btn" onclick="shareLink()">PARTAGER MON LIEN</button>
    </div>

</div>

<script>
    // --- CONFIGURATION ---
    const _supabase = supabase.createClient("https://xkyynzbbatglctgdtqyu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhreXluemJiYXRnbGN0Z2R0cXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDI0NDEsImV4cCI6MjA5MjIxODQ0MX0.yUJc7P2zkYCb1ub2IPwKPUM1duIaVwGsBmfa4TVIvPc");
    const MON_LIEN_RACINE = "okoningana";
    const LIEN_VIDEO = "https://www.youtube.com/watch?v=9uPybhkqYw4";

    const translations = {
        fr: { title: "🔗 Inscription LINKFLOW", sub: "Rejoins la matrice racine", btn: "S'INSCRIRE MAINTENANT", wait: "Patientez..." },
        en: { title: "🔗 LINKFLOW Registration", sub: "Join the root matrix", btn: "REGISTER NOW", wait: "Wait..." },
        // ... garde tes autres traductions ici ...
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const parrainID = urlParams.get('ref') || MON_LIEN_RACINE;
    document.getElementById('ref_code').value = parrainID;

    // --- LOGIQUE INSCRIPTION ---
    async function sinscrire() {
        const user = document.getElementById('username').value.trim();
        const mail = document.getElementById('email').value.trim();
        if(!user || !mail) { alert("Champs vides"); return; }

        // Vérification généalogie (optionnel mais recommandé)
        showToast("Vérification...");

        const { error } = await _supabase.from('users').insert([{ 
            username: user, email: mail, referred_by: parrainID,
            ref_code: "TEMP_" + user.toLowerCase()
        }]);

        if (error) { alert("Erreur d'inscription"); } 
        else {
            document.getElementById('step-registration').classList.add('hidden');
            document.getElementById('step-youtube').classList.remove('hidden');
        }
    }

    // --- LOGIQUE YOUTUBE ---
    function handleYoutube() {
        window.open(LIEN_VIDEO, "_blank");
        let timeLeft = 180;
        const btn = document.getElementById('btn-video');
        btn.disabled = true;
        const timer = setInterval(() => {
            timeLeft--;
            btn.innerText = "Validation... " + timeLeft + "s";
            if(timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('step-youtube').classList.add('hidden');
                document.getElementById('step-victory').classList.remove('hidden');
            }
        }, 1000);
    }

    // --- LOGIQUE VICTORY ---
    function openVictory() {
        window.open(`https://victory-automatic.com/register/${parrainID}`, "_blank");
    }

    async function activerMonLien() {
        const user = document.getElementById('username').value;
        const link = document.getElementById('victory-link-input').value.trim();
        if(!link) return;

        const parties = link.split('/');
        const finalID = parties[parties.length - 1] || parties[parties.length - 2];

        const { error } = await _supabase.from('users').update({ ref_code: finalID }).eq('username', user);

        if(!error) {
            document.getElementById('step-victory').classList.add('hidden');
            document.getElementById('step-share').classList.remove('hidden');
            document.getElementById('step-share').setAttribute('data-my-id', finalID);
        }
    }

    function shareLink() {
        const myID = document.getElementById('step-share').getAttribute('data-my-id');
        const link = window.location.origin + window.location.pathname + "?ref=" + myID;
        if (navigator.share) {
            navigator.share({ title: 'LINKFLOW', text: 'Rejoignez mon équipe !', url: link });
        } else {
            alert("Copiez votre lien : " + link);
        }
    }

    function changeLang() { /* Ta fonction de traduction actuelle */ }
</script>
</body>
</html>
