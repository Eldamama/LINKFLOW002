<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkFlow - Activation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="card">
        <h1>LinkFlow</h1>
        <p class="slogan">L'écosystème qui propulse votre réseau.</p>
       
        <div id="notification" class="hidden"></div>

        <div class="auth-box">
            <input type="text" id="userName" placeholder="Nom d'utilisateur" required>
            <input type="email" id="userEmail" placeholder="Votre Gmail" required>
            <input type="password" id="userPassword" placeholder="Mot de passe" required>
        </div>

        <div id="videoBox" class="video-box hidden">
            <iframe id="videoPlayer" 
                src="https://www.youtube.com/embed/VOTRE_ID_VIDEO?rel=0" 
                frameborder="0" allowfullscreen>
            </iframe>
        </div>

        <div id="stepsBox" class="steps-box hidden">
            <label><input type="checkbox" id="likeCheck"> J'ai aimé</label>
            <label><input type="checkbox" id="commentCheck"> J'ai commenté</label>
            <label><input type="checkbox" id="subCheck"> Je suis abonné</label>
        </div>

        <button id="btnAction">S'INSCRIRE POUR VOIR LA VIDÉO</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
