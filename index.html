<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINK FLOW</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        
        /* Correction COLLAGE : On simplifie l'input */
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #1a73e8; 
            border-radius: 8px; font-size: 16px; display: block; box-sizing: border-box;
            background: white !important; color: black !important;
        }

        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-blue { background: #1a73e8; color: white; }
        .btn-red { background: #ff0000; color: white; text-decoration: none; display: block; text-align: center; }
        .btn-dark { background: #333; color: white; }
        
        .msg-error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 5px; font-size: 13px; text-align: center; margin-bottom: 15px; display: none; }
        #generatorSection, #actionsSection, #linkSection, #btnDeconnect { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align:center; color:#1a73e8;">LINK FLOW</h2>
        <div id="status" style="text-align:center; font-size:12px; margin-bottom:10px;"></div>

        <div id="lockMessage" class="msg-error">
            ⚠️ Accès restreint : Lien d'invitation requis.
        </div>

        <div id="authSection">
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="mdpInput" placeholder="Mot de passe">
            <button class="btn btn-blue" onclick="connecter()">CONNEXION</button>
        </div>

        <div id="generatorSection">
            <p style="font-size:13px; font-weight:bold;">Collez votre lien Victory Automatic :</p>
            <input type="text" id="v_link_input" placeholder="https://victoryautomatic.com/...">
            <button id="btnGenerate" class="btn btn-blue" onclick="generateLink()">GÉNÉRER MON LIEN VIRAL</button>
            <div id="resultBox" style="display:none; margin-top:10px; background:#e8f5e9; padding:10px; border-radius:5px; word-break:break-all;">
                <code id="displayLink" style="font-weight:bold; color:red;"></code>
            </div>
        </div>

        <div id="actionsSection">
            <a href="https://www.youtube.com/watch?v=9uPybhkqYw4" target="_blank" class="btn btn-red" onclick="interactionFaite=true">🔴 ÉTAPE 1 : AGIR SUR YOUTUBE</a>
            <div id="player" style="margin-top:15px; width:100%; border-radius:8px;"></div>
            <button class="btn btn-dark" onclick="verifierAcces()">ÉTAPE 2 : VÉRIFIER L'ACCÈS</button>
        </div>

        <div id="linkSection">
            <a id="dynamicFinalLink" href="#" target="_blank" class="btn" style="background:#4CAF50; color:white; display:block; text-align:center; text-decoration:none;">🚀 S'INSCRIRE MAINTENANT</a>
        </div>

        <button id="btnDeconnect" style="background:none; border:none; color:red; width:100%; margin-top:20px;" onclick="deconnecter()">DÉCONNEXION</button>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
            authDomain: "linkflow-7a82a.firebaseapp.com",
            databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "linkflow-7a82a",
            storageBucket: "linkflow-7a82a.firebasestorage.app",
            messagingSenderId: "459654757296",
            appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475"
        };
        firebase.initializeApp(firebaseConfig);

        let videoTerminee = false;
        let interactionFaite = false;

        function connecter() {
            const e = document.getElementById("emailInput").value;
            const m = document.getElementById("mdpInput").value;
            firebase.auth().signInWithEmailAndPassword(e, m).catch(err => alert(err.message));
        }

        function deconnecter() { firebase.auth().signOut().then(() => location.reload()); }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("generatorSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "block";
                document.getElementById("btnDeconnect").style.display = "block";
                document.getElementById("status").innerText = "✅ Session : " + user.email;
                
                // AUTORISATION : Si c'est ton email admin, on débloque tout sans condition de parrainage
                const params = new URLSearchParams(window.location.search);
                const ref = params.get('ref');
                if (!ref && user.email !== "lobongoaime@gmail.com") {
                    document.getElementById("btnGenerate").disabled = true;
                    document.getElementById("btnGenerate").style.opacity = "0.5";
                    document.getElementById("lockMessage").style.display = "block";
                } else if (ref) {
                    document.getElementById("dynamicFinalLink").href = "https://victoryautomatic.com/user/register/" + ref;
                }
            }
        });

        function generateLink() {
            const val = document.getElementById("v_link_input").value.trim();
            if(val.includes('victoryautomatic.com')) {
                const pseudo = val.split('/').pop();
                const finalUrl = window.location.origin + window.location.pathname + "?ref=" + pseudo;
                document.getElementById("displayLink").innerText = finalUrl;
                document.getElementById("resultBox").style.display = "block";
            } else { alert("Lien Victory invalide"); }
        }

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '200', width: '100%', videoId: '9uPybhkqYw4',
                events: { 'onStateChange': e => { if(e.data === YT.PlayerState.ENDED) videoTerminee = true; } }
            });
        }

        function verifierAcces() {
            if (videoTerminee && interactionFaite) {
                document.getElementById("linkSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "none";
            } else { alert("⚠️ Terminez la vidéo et cliquez sur le bouton rouge !"); }
        }
    </script>
</body>
</html>
