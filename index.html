<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LinkFlow - Connexion & Inscription</title>
  <style>
    body {
      background-color: #000;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 20px;
      color: gold;
    }
    .form-container {
      margin: 20px auto;
      width: 300px;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      background-color: #111;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 4px;
    }
    .btn {
      width: 95%;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-inscription { background-color: gold; color: black; }
    .btn-connexion { background-color: green; color: white; }
    .error { color: red; font-size: 0.9em; }
    .lang-select {
      margin-top: 10px;
      background: blue;
      color: white;
      padding: 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Logo LinkFlow</h1>
    <p>L’écosystème qui propulse votre réseau</p>
    <select class="lang-select">
      <option value="fr">FR</option>
      <option value="en">EN</option>
      <option value="es">ES</option>
      <option value="pt">PT</option>
    </select>
  </header>

  <div class="form-container">
    <h2>Inscription</h2>
    <input type="text" placeholder="Nom d’utilisateur" id="signup-user">
    <input type="password" placeholder="Mot de passe" id="signup-pass">
    <div class="error" id="signup-error"></div>
    <button class="btn btn-inscription">Créer un compte</button>
  </div>

  <div class="form-container">
    <h2>Connexion</h2>
    <input type="text" placeholder="Nom d’utilisateur" id="login-user">
    <input type="password" placeholder="Mot de passe" id="login-pass">
    <div class="error" id="login-error"></div>
    <button class="btn btn-connexion">Se connecter</button>
  </div>

  <!-- Script pour gérer inscription/connexion -->
  <script>
    // Inscription
    document.querySelector(".btn-inscription").addEventListener("click", function() {
      const user = document.getElementById("signup-user").value;
      const pass = document.getElementById("signup-pass").value;

      if(user && pass.length >= 4) {
        localStorage.setItem("user", user);
        localStorage.setItem("pass", pass);
        alert("Compte créé avec succès !");
        document.getElementById("signup-error").textContent = "";
      } else {
        document.getElementById("signup-error").textContent = "Nom ou mot de passe invalide (min 4 caractères)";
      }
    });

    // Connexion
    document.querySelector(".btn-connexion").addEventListener("click", function() {
      const user = document.getElementById("login-user").value;
      const pass = document.getElementById("login-pass").value;

      if(user === localStorage.getItem("user") && pass === localStorage.getItem("pass")) {
        alert("Connexion réussie !");
        document.getElementById("login-error").textContent = "";
      } else {
        document.getElementById("login-error").textContent = "Identifiants incorrects";
      }
    });
  </script>
</body>
</html>
