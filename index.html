<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK FLOW - Système Viral</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; line-height: 1.5; max-width: 500px; margin: auto; color: #333; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; z-index: 1; }
        h1 { color: #1a73e8; font-size: 26px; text-align: center; font-weight: bold; margin-bottom: 10px; }
        
        /* Style des entrées : On s'assure qu'elles sont cliquables */
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 2px solid #ccc; 
            box-sizing: border-box;
            background: #fff;
            font-size: 16px; /* Évite le zoom auto sur iPhone */
            display: block;
            position: relative;
            z-index: 10;
        }
        input:focus { border-color: #1a73e8; outline: none; }

        button { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-auth { background-color: #1a73e8; color: white; }
        .btn-yt { background-color: #ff0000; color: white !important; text-decoration: none; display: block; text-align: center; border-radius: 30px; padding: 15px; margin: 15px 0; font-weight: bold; }
        .btn-success { background-color: #4CAF50; color: white !important; padding: 18px; text-decoration: none; display: none; text-align: center; border-radius: 8px; margin-top: 20px; font-weight: bold; }
        
        .generator-box { background-color: #f0f4ff; border: 2px dashed #1a73e8; padding: 15px; border-radius: 8px; margin: 20px 0; position: relative; z-index: 5; }
        .strategy-box { background-color: #fff3e0; border-left: 5px solid #ff9800; padding: 15px; font-size: 0.9em; border-radius: 4px; margin: 15px 0; }
        
        #player, #actionsSection, #linkSection, #generatorSection, #btnDeconnect { display: none; }
        #status { font-weight: bold; text-align: center; margin: 10px 0; color: #555; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin-top: 15px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .link-forgot { text-align: center; display: block; font-size: 0.8em; color: #1a73e8; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="card">
        <h1>LINK FLOW</h1>
        <div id="status">Veuillez vous connecter</div>

        <div id="authSection">
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="mdpInput" placeholder="Mot de passe">
            <button class="btn-auth" onclick="connecter()">Se connecter</button>
            <button style="background:#eee;" onclick="inscrire()">Créer un compte</button>
            <a href="#" class="link-forgot" onclick="recupererMdp()">Mot de passe oublié ?</a>
        </div>

        <div id="generatorSection" class="generator-box">
            <h4 style="margin:0; color:#1a73e8;">🛠️ Créez votre lien LinkFlow</h4>
            <p style="font-size:0.8em; margin: 5px 0;">Collez votre lien Victory Automatic complet ci-dessous :</p>
            
            <input type="text" id="v_link_input" placeholder="https://victoryautomatic.com/user/register/votre_pseudo" onclick="this.select();">
            
            <button class="btn-auth" onclick="generateLink()">GÉNÉRER MON OUTIL</button>
            
            <div id="resultBox" style="display:none; margin-top:15px; padding: 10px; background: white; border: 1px solid #4CAF50; border-radius: 5px;">
                <p style="font-size: 0.8em; margin: 0; color: #2e7d32;"><strong>Copiez ce lien pour partager :</strong></p>
                <code id="displayLink" style="display: block; word-break: break-all; color: #d32f2f; font-weight: bold; margin-top: 5px;"></code>
            </div>
        </div>

        <div id="actionsSection">
            <div class="strategy-box">
                <strong>🚀 Mission Viralité :</strong> Likez, Commentez et Abonnez-vous !
            </div>
            <a href="https://www.youtube.com/watch?v=9uPybhkqYw4" target="_blank" class="btn-yt" onclick="marquerInteraction()">
                🔴 AGIR SUR YOUTUBE
            </a>
            <div id="player" class="video-container"></div>
            <button class="btn-auth" style="background:#333; margin-top:15px;" onclick="verifierAcces()">VÉRIFIER MON ACCÈS</button>
        </div>

        <div id="linkSection">
            <a id="dynamicFinalLink" href="#" target="_blank" class="btn-success" style="display:block;">
                🚀 ACCÉDER À MON INSCRIPTION
            </a>
        </div>

        <button id="btnDeconnect" style="margin-top:20px; background:none; color:red; border: 1px solid red;" onclick="deconnecter()">Se déconnecter</button>
    </div>

    <script>
        // SÉCURITÉ
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        // FIREBASE
        var firebaseConfig = {
            apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
            authDomain: "linkflow-7a82a.firebaseapp.com",
            databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "linkflow-7a82a",
            storageBucket: "linkflow-7a82a.firebasestorage.app",
            messagingSenderId: "459654757296",
            appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475",
            measurementId: "G-THW9XMEJTX"
        };
        firebase.initializeApp(firebaseConfig);

        let videoTerminee = false;
        let interactionFaite = false;

        function inscrire() {
            const email = document.getElementById("emailInput").value;
            const mdp = document.getElementById("mdpInput").value;
            firebase.auth().createUserWithEmailAndPassword(email, mdp)
                .catch(e => alert(e.message));
        }

        function connecter() {
            const email = document.getElementById("emailInput").value;
            const mdp = document.getElementById("mdpInput").value;
            firebase.auth().signInWithEmailAndPassword(email, mdp)
                .catch(e => alert(e.message));
        }

        function recupererMdp() {
            const email = document.getElementById("emailInput").value;
            if (!email) { alert("Entrez votre email."); return; }
            firebase.auth().sendPasswordResetEmail(email).then(() => alert("Lien envoyé !"));
        }

        function deconnecter() { firebase.auth().signOut().then(() => location.reload()); }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("generatorSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "block";
                document.getElementById("btnDeconnect").style.display = "block";
                document.getElementById("status").innerText = "👤 Connecté : " + user.email;
                initParrainage();
            }
        });

        function initParrainage() {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref') || 'okoningana';
            document.getElementById("dynamicFinalLink").href = "https://victoryautomatic.com/user/register/" + ref;
        }

        function generateLink() {
            const val = document.getElementById("v_link_input").value.trim();
            if(val.includes('victoryautomatic.com')) {
                const parts = val.split('/');
                const pseudo = parts[parts.length - 1] || parts[parts.length - 2];
                const finalUrl = window.location.origin + window.location.pathname + "?ref=" + pseudo;
                document.getElementById("displayLink").innerText = finalUrl;
                document.getElementById("resultBox").style.display = "block";
            } else {
                alert("Veuillez coller votre lien Victory Automatic complet.");
            }
        }

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '9uPybhkqYw4',
                events: { 'onStateChange': e => { if(e.data === YT.PlayerState.ENDED) videoTerminee = true; } }
            });
        }

        function marquerInteraction() { interactionFaite = true; }

        function verifierAcces() {
            if (videoTerminee && interactionFaite) {
                document.getElementById("linkSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "none";
                document.getElementById("generatorSection").style.display = "none";
            } else {
                alert("⚠️ Regardez la vidéo jusqu'au bout et cliquez sur 'AGIR SUR YOUTUBE'.");
            }
        }
    </script>
</body>
</html>
