<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK FLOW - Réseau Privé</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; line-height: 1.5; max-width: 500px; margin: auto; color: #333; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        h1 { color: #1a73e8; font-size: 26px; text-align: center; font-weight: bold; margin-bottom: 10px; }
        
        .input-field { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 6px; border: 2px solid #1a73e8; 
            box-sizing: border-box; background: #fff !important; color: #000 !important; font-size: 16px;
            display: block; position: relative; z-index: 1000; cursor: text;
        }

        button { width: 100%; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-auth { background-color: #1a73e8; color: white; }
        .btn-yt { background-color: #ff0000; color: white !important; text-decoration: none; display: block; text-align: center; border-radius: 30px; padding: 15px; margin: 15px 0; font-weight: bold; }
        .btn-success { background-color: #4CAF50; color: white !important; padding: 18px; text-decoration: none; display: none; text-align: center; border-radius: 8px; margin-top: 20px; font-weight: bold; }
        
        .generator-box { background-color: #f0f4ff; border: 2px dashed #1a73e8; padding: 15px; border-radius: 8px; margin: 20px 0; }
        .locked-msg { background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 5px; font-size: 0.8em; text-align: center; display: none; margin-bottom: 10px; }
        
        #player, #actionsSection, #linkSection, #generatorSection, #btnDeconnect { display: none; }
        #status { font-weight: bold; text-align: center; margin-bottom: 15px; font-size: 0.85em; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin-top: 15px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="card">
        <h1>LINK FLOW</h1>
        <div id="status">Veuillez vous authentifier</div>

        <div id="lockMessage" class="locked-msg">
            ⚠️ Accès restreint. Vous devez avoir été invité par un membre LINKFLOW pour générer un lien.
        </div>

        <div id="authSection">
            <input type="email" id="emailInput" class="input-field" placeholder="Votre Email">
            <input type="password" id="mdpInput" class="input-field" placeholder="Mot de passe">
            <button class="btn-auth" onclick="connecter()">SE CONNECTER</button>
            <button style="background:#eee; color:#555;" onclick="inscrire()">S'INSCRIRE</button>
        </div>

        <div id="generatorSection" class="generator-box">
            <h4 style="margin:0; color:#1a73e8;">🏆 Votre Lien LinkFlow</h4>
            <p style="font-size:0.8em; margin: 5px 0;">Collez votre lien Victory Automatic :</p>
            
            <input type="text" id="v_link_input" class="input-field" placeholder="https://victoryautomatic.com/user/register/...">
            
            <button id="btnGenerate" class="btn-auth" onclick="generateLink()">ACTIVER MON OUTIL</button>
            
            <div id="resultBox" style="display:none; margin-top:15px; padding: 12px; background: #fff; border: 2px solid #4CAF50; border-radius: 5px;">
                <code id="displayLink" style="display: block; word-break: break-all; color: #d32f2f; font-weight: bold;"></code>
            </div>
        </div>

        <div id="actionsSection">
            <a href="https://www.youtube.com/watch?v=9uPybhkqYw4" target="_blank" class="btn-yt" onclick="marquerInteraction()">🔴 AGIR SUR YOUTUBE</a>
            <div id="player" class="video-container"></div>
            <button class="btn-auth" style="background:#333; margin-top:15px;" onclick="verifierAcces()">VÉRIFIER L'ACCÈS</button>
        </div>

        <div id="linkSection">
            <a id="dynamicFinalLink" href="#" target="_blank" class="btn-success" style="display:block;">🚀 S'INSCRIRE SOUS VOTRE PARRAIN</a>
        </div>

        <button id="btnDeconnect" style="margin-top:20px; background:none; color:#d32f2f; border: 1px solid #d32f2f; font-size: 0.7em;" onclick="deconnecter()">DÉCONNEXION</button>
    </div>

    <script>
        // SÉCURITÉ
        document.onkeydown = function(e) { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };

        // CONFIG
        var firebaseConfig = {
            apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
            authDomain: "linkflow-7a82a.firebaseapp.com",
            databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "linkflow-7a82a",
            storageBucket: "linkflow-7a82a.firebasestorage.app",
            messagingSenderId: "459654757296",
            appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475",
            measurementId: "G-THW9XMEJTX"
        };
        firebase.initializeApp(firebaseConfig);

        let videoTerminee = false;
        let interactionFaite = false;
        let membreAutorise = false;

        // AUTHENTIFICATION
        function inscrire() {
            const e = document.getElementById("emailInput").value;
            const m = document.getElementById("mdpInput").value;
            firebase.auth().createUserWithEmailAndPassword(e, m).catch(err => alert(err.message));
        }

        function connecter() {
            const e = document.getElementById("emailInput").value;
            const m = document.getElementById("mdpInput").value;
            firebase.auth().signInWithEmailAndPassword(e, m).catch(err => alert(err.message));
        }

        function deconnecter() { firebase.auth().signOut().then(() => location.reload()); }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("generatorSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "block";
                document.getElementById("btnDeconnect").style.display = "block";
                document.getElementById("status").innerText = "👤 Membre : " + user.email;
                checkAccess();
            }
        });

        // VÉRIFICATION DU RÉSEAU (Vérifie si le ref existe)
        function checkAccess() {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref');
            
            // Si pas de parrain dans l'URL, on bloque le bouton de génération
            if (!ref) {
                document.getElementById("btnGenerate").disabled = true;
                document.getElementById("btnGenerate").style.background = "#ccc";
                document.getElementById("lockMessage").style.display = "block";
                membreAutorise = false;
            } else {
                membreAutorise = true;
                document.getElementById("dynamicFinalLink").href = "https://victoryautomatic.com/user/register/" + ref;
            }
        }

        function generateLink() {
            if (!membreAutorise) return;

            const val = document.getElementById("v_link_input").value.trim();
            if(val.toLowerCase().includes('victoryautomatic.com/user/register/')) {
                const pseudo = val.split('/').pop();
                const finalUrl = window.location.origin + window.location.pathname + "?ref=" + pseudo;
                document.getElementById("displayLink").innerText = finalUrl;
                document.getElementById("resultBox").style.display = "block";
            } else {
                alert("❌ Erreur : Seul le lien Victory Automatic est accepté.");
            }
        }

        // YOUTUBE API
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '9uPybhkqYw4',
                events: { 'onStateChange': e => { if(e.data === YT.PlayerState.ENDED) videoTerminee = true; } }
            });
        }

        function marquerInteraction() { interactionFaite = true; }

        function verifierAcces() {
            if (videoTerminee && interactionFaite) {
                document.getElementById("linkSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "none";
            } else {
                alert("⚠️ Action YouTube incomplète !");
            }
        }
    </script>
</body>
</html>
