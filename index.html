<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINK FLOW - Propulsion ⚡</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --primary: #2563eb; --secondary: #00d2ff; --bg: #0c0f1a;
            --card-bg: rgba(30, 41, 59, 0.7); --text: #e2e8f0;
            --danger: #ef4444; --success: #22c55e;
        }

        body {
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
            padding: 15px; display: flex; flex-direction: column; align-items: center;
            margin: 0; min-height: 100vh; user-select: none;
        }

        .card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 10px; text-align: center;
        }

        #appName {
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2.5rem; margin: 0; font-weight: bold;
        }

        .slogan { font-size: 0.85rem; color: var(--secondary); margin-bottom: 20px; font-style: italic; }

        #notification { padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 0.85rem; display: none; }
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: #ffbaba; }
        .success-box { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--success); color: #b7ffd0; }

        .input-group { position: relative; width: 100%; margin: 8px 0; }
        input {
            width: 100%; padding: 14px; border-radius: 10px;
            border: 1px solid #334155; background: #1e293b; color: white;
            box-sizing: border-box; font-size: 16px;
        }
        .eye-icon { position: absolute; right: 15px; top: 14px; cursor: pointer; color: var(--secondary); z-index: 10; font-size: 18px; }

        button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .forgot-link { display: block; font-size: 0.8rem; margin-top: 12px; color: var(--secondary); text-decoration: underline; cursor: pointer; }

        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; 
            overflow: hidden; border-radius: 15px; margin: 15px 0;
            background: #000; border: 1px solid rgba(255,255,255,0.1);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #playButton { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; cursor: pointer; width: 100%; }

        #generatorSection, #actionsSection, #btnDeconnect, #resultBox, #finalStep { display: none; }
        #status { font-size: 0.7rem; color: #94a3b8; margin-bottom: 5px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="card">
        <h1 id="appName">LINK FLOW</h1>
        <p class="slogan">Propulsion Virale & Sécurisée ⚡</p>
        
        <div id="status">Chargement du système...</div>
        <div id="notification"></div>

        <div id="authSection">
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Email">
            </div>
            <div class="input-group">
                <input type="password" id="mdpInput" placeholder="Mot de passe">
                <span class="eye-icon" onclick="toggleMdp()">👁️</span>
            </div>
            <button onclick="connecter()">SE CONNECTER</button>
            <a class="forgot-link" onclick="recupererMdp()">Mot de passe oublié ?</a>
            <button style="background:none; border: 1px solid #334155; margin-top:20px;" onclick="inscrire()">Créer un compte</button>
        </div>

        <div id="actionsSection">
            <p style="font-size:0.8rem; color:var(--secondary);">Regardez la vidéo pour débloquer l'accès</p>
            <div class="video-container">
                <div id="playButton" onclick="lancerVideo()">
                    <div style="background:var(--primary); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin: 0 auto; box-shadow: 0 0 15px var(--primary);">
                        <span style="color:white; font-size:25px; margin-left:5px;">▶</span>
                    </div>
                </div>
                <div id="player"></div>
            </div>
            <button style="background:#cc0000;" onclick="allerSurYoutube()">🔴 ÉTAPE 1 : AGIR SUR YOUTUBE</button>
            <button id="verifyBtn" style="background:#1e293b; border:1px solid var(--primary); margin-top:15px;" onclick="verifierAcces()">ÉTAPE 2 : VÉRIFIER L'ACCÈS</button>
        </div>

        <div id="finalStep">
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
            
            <button id="btnVictory" style="background: var(--success); margin-bottom: 20px;" onclick="ouvrirVictory()">🚀 M'INSCRIRE SUR VICTORY</button>

            <div id="generatorSection" style="display:block;">
                <p style="font-size:0.85rem; color:var(--secondary);">Générer mon lien personnel :</p>
                <input type="text" id="v_link_input" placeholder="Lien d'inscription Victory...">
                <button onclick="generateLink()">OBTENIR MON LIEN VIRAL</button>
                <div id="resultBox" class="success-box" style="margin-top:15px; padding:15px; display:none;">
                    <code id="displayLink" style="font-weight:bold; word-break:break-all; color:#fff;"></code>
                </div>
            </div>
        </div>

        <button id="btnDeconnect" style="background:none; border:none; color:#64748b; margin-top:30px; font-size:0.7rem;" onclick="deconnecter()">DÉCONNEXION</button>
    </div>

    <script>
        // CONFIG
        var firebaseConfig = {
            apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
            authDomain: "linkflow-7a82a.firebaseapp.com",
            databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "linkflow-7a82a",
            storageBucket: "linkflow-7a82a.firebasestorage.app",
            messagingSenderId: "459654757296",
            appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475"
        };
        firebase.initializeApp(firebaseConfig);

        var player;
        let _0x_vT = false; 
        let _0x_iF = false; 
        let refLink = "";

        function showNotify(text, type) {
            const n = document.getElementById("notification");
            n.innerText = text; n.className = type; n.style.display = "block";
            setTimeout(() => { n.style.display = "none"; }, 5000);
        }

        function toggleMdp() {
            const m = document.getElementById("mdpInput");
            m.type = m.type === "password" ? "text" : "password";
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("actionsSection").style.display = "block";
                document.getElementById("btnDeconnect").style.display = "block";
                document.getElementById("status").innerText = "Membre : " + user.email;
                
                const params = new URLSearchParams(window.location.search);
                const ref = params.get('ref');
                refLink = "https://victoryautomatic.com/user/register/" + (ref || "okoningana");
            } else {
                document.getElementById("authSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "none";
                document.getElementById("finalStep").style.display = "none";
                document.getElementById("status").innerText = "Veuillez vous identifier";
            }
        });

        function connecter() {
            const e = document.getElementById("emailInput").value;
            const m = document.getElementById("mdpInput").value;
            firebase.auth().signInWithEmailAndPassword(e, m).catch(err => showNotify("Erreur de connexion", "error"));
        }

        function inscrire() {
            const e = document.getElementById("emailInput").value;
            const m = document.getElementById("mdpInput").value;
            firebase.auth().createUserWithEmailAndPassword(e, m).catch(err => showNotify("Erreur inscription", "error"));
        }

        function recupererMdp() {
            const e = document.getElementById("emailInput").value.trim();
            if(!e) return showNotify("Entrez votre email", "error");
            firebase.auth().sendPasswordResetEmail(e).then(() => showNotify("Email envoyé !", "success-box"));
        }

        function deconnecter() { firebase.auth().signOut().then(() => location.reload()); }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '9uPybhkqYw4',
                events: { 'onStateChange': e => { if(e.data === YT.PlayerState.ENDED) _0x_vT = true; } }
            });
        }

        function lancerVideo() {
            document.getElementById("playButton").style.display = "none";
            if (player && player.playVideo) player.playVideo();
        }

        function allerSurYoutube() {
            _0x_iF = true;
            window.open("https://www.youtube.com/watch?v=9uPybhkqYw4", "_blank");
            showNotify("Étape 1 validée !", "success-box");
        }

        function verifierAcces() {
            if (_0x_vT && _0x_iF) {
                document.getElementById("actionsSection").style.display = "none";
                document.getElementById("finalStep").style.display = "block";
                document.getElementById("status").innerText = "🔓 Système débloqué";
            } else {
                alert("⚠️ Finissez la vidéo et cliquez sur le bouton YouTube.");
            }
        }

        function ouvrirVictory() { window.open(refLink, '_blank'); }

        function generateLink() {
            const val = document.getElementById("v_link_input").value.trim();
            if(val.includes('victoryautomatic.com/user/register/')) {
                const pseudo = val.split('/').filter(Boolean).pop();
                document.getElementById("displayLink").innerText = window.location.origin + window.location.pathname + "?ref=" + pseudo;
                document.getElementById("resultBox").style.display = "block";
            } else { showNotify("Lien invalide", "error"); }
        }
    </script>
</body>
</html>
