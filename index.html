<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINK FLOW - Authentification</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    #player, #actionsSection, #linkSection, #notification {
      display: none;
      margin-top: 20px;
    }
    #notification {
      padding: 15px;
      border-radius: 5px;
      background-color: #e8f5e9;
      color: #2e7d32;
      font-weight: bold;
    }
    #linkSection a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    input, select { display: block; margin: 10px 0; padding: 10px; width: 100%; max-width: 300px; }
    button { margin: 5px 0; padding: 10px 15px; cursor: pointer; background-color: #f0f0f0; border: 1px solid #ccc; }
    #status { font-weight: bold; margin: 10px 0; }
  </style>
</head>
<body>

  <h1>LINK FLOW</h1>
  <p id="status">En attente d'action...</p>

  <label for="langSelect">🌐 Langue / Language:</label>
  <select id="langSelect">
    <option value="fr">Français</option>
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="pt">Português</option>
  </select>

  <div id="authSection">
    <h2>Inscription / Connexion</h2>
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="mdpInput" placeholder="Mot de passe">
    <button onclick="inscrire()">S'inscrire</button>
    <button onclick="connecter()">Se connecter</button>
  </div>

  <button onclick="deconnecter()" id="btnDeconnecter" style="display:none;">Se déconnecter</button>

  <div id="notification"></div>
  <div id="player"></div>

  <div id="actionsSection">
    <button id="likeBtn">👍 Liker la vidéo</button>
    <button id="commentBtn">💬 Commenter la vidéo</button>
  </div>

  <div id="linkSection">
    <p>✅ Merci ! Vous pouvez maintenant accéder au réseau :</p>
    <a href="https://victoryautomatic.com/user/register/okoningana" target="_blank">Accéder à Victor Automatic</a>
  </div>

  <script>
    // 1. TRADUCTIONS (Placées au début pour éviter les erreurs)
    const traductions = {
      fr: { notification: "✅ Connecté ! Regardez la vidéo et interagissez (like/commentaire) pour débloquer le lien." },
      en: { notification: "✅ Connected! Watch the video and interact (like/comment) to unlock the link." },
      es: { notification: "✅ ¡Conectado! Mira el video e interactúa para desbloquear el enlace." },
      pt: { notification: "✅ Conectado! Assista ao vídeo e interaja para desbloquear o link." }
    };

    // 2. CONFIGURATION FIREBASE
    var firebaseConfig = {
      apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
      authDomain: "linkflow-7a82a.firebaseapp.com",
      databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "linkflow-7a82a",
      storageBucket: "linkflow-7a82a.firebasestorage.app",
      messagingSenderId: "459654757296",
      appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475",
      measurementId: "G-THW9XMEJTX"
    };
    firebase.initializeApp(firebaseConfig);

    // 3. LOGIQUE D'AUTHENTIFICATION
    function inscrire() {
      const email = document.getElementById("emailInput").value;
      const mdp = document.getElementById("mdpInput").value;
      firebase.auth().createUserWithEmailAndPassword(email, mdp)
        .catch(e => alert("Erreur Inscription: " + e.message));
    }

    function connecter() {
      const email = document.getElementById("emailInput").value;
      const mdp = document.getElementById("mdpInput").value;
      firebase.auth().signInWithEmailAndPassword(email, mdp)
        .catch(e => alert("Erreur Connexion: " + e.message));
    }

    function deconnecter() {
      firebase.auth().signOut();
    }

    // 4. SURVEILLANCE DE L'UTILISATEUR
    let langActuelle = "fr";
    document.getElementById("langSelect").addEventListener("change", e => langActuelle = e.target.value);

    firebase.auth().onAuthStateChanged(user => {
      const authDiv = document.getElementById("authSection");
      const btnDeco = document.getElementById("btnDeconnecter");
      const notif = document.getElementById("notification");
      const playerDiv = document.getElementById("player");

      if (user) {
        authDiv.style.display = "none";
        btnDeco.style.display = "block";
        notif.style.display = "block";
        notif.innerText = traductions[langActuelle].notification;
        playerDiv.style.display = "block";
        document.getElementById("status").innerText = "Connecté : " + user.email;
      } else {
        authDiv.style.display = "block";
        btnDeco.style.display = "none";
        notif.style.display = "none";
        playerDiv.style.display = "none";
        document.getElementById("status").innerText = "Veuillez vous identifier.";
      }
    });

    // 5. YOUTUBE ET INTERACTIONS
    var player;
    let videoTerminee = false;
    let interactionFaite = false;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '240',
        width: '100%',
        videoId: '9uPybhkqYw4',
        events: { 'onStateChange': onPlayerStateChange }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        videoTerminee = true;
        document.getElementById("actionsSection").style.display = "block";
      }
    }

    function verifierAcces() {
      if (videoTerminee && interactionFaite) {
        document.getElementById("linkSection").style.display = "block";
      }
    }

    document.getElementById("likeBtn").onclick = () => { interactionFaite = true; verifierAcces(); alert("Merci pour le Like !"); };
    document.getElementById("commentBtn").onclick = () => { interactionFaite = true; verifierAcces(); alert("Merci pour le Commentaire !"); };

  </script>
</body>
</html>
