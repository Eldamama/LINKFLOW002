<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LinkFlow - Connexion & Inscription</title>
  <style>
    body {
      background-color: #000;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 20px;
      color: gold;
    }
    .form-container {
      margin: 20px auto;
      width: 300px;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 8px;
      background-color: #111;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 4px;
    }
    .btn {
      width: 95%;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-inscription { background-color: gold; color: black; }
    .btn-connexion { background-color: green; color: white; }
    .error { color: red; font-size: 0.9em; }
    .lang-select {
      margin-top: 10px;
      background: blue;
      color: white;
      padding: 5px;
      border-radius: 4px;
    }
    #video-section {
      margin-top: 30px;
    }
    #link-btn {
      background-color: blue;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    #link-btn:disabled {
      background-color: gray;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <h1>Logo LinkFlow</h1>
    <p>L’écosystème qui propulse votre réseau</p>
    <select class="lang-select">
      <option value="fr">FR</option>
      <option value="en">EN</option>
      <option value="es">ES</option>
      <option value="pt">PT</option>
    </select>
  </header>

  <div class="form-container">
    <h2 id="signup-title">Inscription</h2>
    <input type="text" placeholder="Nom d’utilisateur" id="signup-user">
    <input type="password" placeholder="Mot de passe" id="signup-pass">
    <div class="error" id="signup-error"></div>
    <button class="btn btn-inscription" id="signup-btn">Créer un compte</button>
  </div>

  <div class="form-container">
    <h2 id="login-title">Connexion</h2>
    <input type="text" placeholder="Nom d’utilisateur" id="login-user">
    <input type="password" placeholder="Mot de passe" id="login-pass">
    <div class="error" id="login-error"></div>
    <button class="btn btn-connexion" id="login-btn">Se connecter</button>
  </div>

  <!-- Section vidéo + bouton -->
  <div id="video-section" style="display:none;">
    <h2 id="video-title">Votre vidéo</h2>
    <video id="promo-video" width="320" height="240" controls>
      <source src="ma_video.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la vidéo.
    </video>
    <br>
    <button id="link-btn" disabled>J’obtiens le lien</button>
  </div>

  <!-- Script -->
  <script>
    // Dictionnaire des traductions
    const translations = {
      fr: {
        signupTitle: "Inscription",
        signupUser: "Nom d’utilisateur",
        signupPass: "Mot de passe",
        signupBtn: "Créer un compte",
        loginTitle: "Connexion",
        loginUser: "Nom d’utilisateur",
        loginPass: "Mot de passe",
        loginBtn: "Se connecter",
        videoTitle: "Votre vidéo",
        linkBtn: "J’obtiens le lien"
      },
      es: {
        signupTitle: "Registro",
        signupUser: "Nombre de usuario",
        signupPass: "Contraseña",
        signupBtn: "Crear cuenta",
        loginTitle: "Conexión",
        loginUser: "Nombre de usuario",
        loginPass: "Contraseña",
        loginBtn: "Iniciar sesión",
        videoTitle: "Su vídeo",
        linkBtn: "Obtengo el enlace"
      },
      en: {
        signupTitle: "Sign Up",
        signupUser: "Username",
        signupPass: "Password",
        signupBtn: "Create Account",
        loginTitle: "Login",
        loginUser: "Username",
        loginPass: "Password",
        loginBtn: "Log In",
        videoTitle: "Your Video",
        linkBtn: "Get the Link"
      },
      pt: {
        signupTitle: "Registro",
        signupUser: "Nome de usuário",
        signupPass: "Senha",
        signupBtn: "Criar conta",
        loginTitle: "Conexão",
        loginUser: "Nome de usuário",
        loginPass: "Senha",
        loginBtn: "Entrar",
        videoTitle: "Seu vídeo",
        linkBtn: "Obter o link"
      }
    };

    // Fonction pour changer la langue
    function changeLanguage(lang) {
      const t = translations[lang];
      document.getElementById("signup-title").textContent = t.signupTitle;
      document.getElementById("signup-user").placeholder = t.signupUser;
      document.getElementById("signup-pass").placeholder = t.signupPass;
      document.getElementById("signup-btn").textContent = t.signupBtn;

      document.getElementById("login-title").textContent = t.loginTitle;
      document.getElementById("login-user").placeholder = t.loginUser;
      document.getElementById("login-pass").placeholder = t.loginPass;
      document.getElementById("login-btn").textContent = t.loginBtn;

      document.getElementById("video-title").textContent = t.videoTitle;
      document.getElementById("link-btn").textContent = t.linkBtn;
    }

    document.querySelector(".lang-select").addEventListener("change", function() {
      changeLanguage(this.value);
    });

    // Inscription
    document.getElementById("signup-btn").addEventListener("click", function() {
      const user = document.getElementById("signup-user").value;
      const pass = document.getElementById("signup-pass").value;

      if(user && pass.length >= 4) {
        localStorage.setItem("user", user);
        localStorage.setItem("pass", pass);
        alert("Compte créé avec succès !");
        document.getElementById("signup-error").textContent = "";
        document.getElementById("video-section").style.display = "block"; // affiche la vidéo
      } else {
        document.getElementById("signup-error").textContent = "Nom ou mot de passe invalide (min 4 caractères)";
      }
    });

    // Connexion
    document.getElementById("login-btn").addEventListener("click", function() {
      const user = document.getElementById("login-user").value;
      const pass = document.getElementById("login-pass").value;

      if(user === localStorage.getItem("user") && pass === localStorage.getItem("pass")) {
        alert("Connexion réussie !");
        document.getElementById("login-error").textContent = "";
        document.getElementById("video-section").style.display = "block"; // affiche la vidéo
      } else {
        document.getElementById("login-error").textContent = "Identifiants incorrects";
      }
    });

    // Verrouillage du bouton pendant 120 secondes
    const video = document.getElementById("promo-video");
    const btn = document.getElementById("link-btn");

    video.addEventListener("play", function() {
      btn.disabled = true; // bouton verrouillé
      setTimeout(() => {
        btn.disabled = false; // bouton débloqué après 120 secondes
      }, 120000); // 120000 ms = 120 secondes
    });

    // Action du bouton une fois débloqué
    btn.addEventListener("click", function() {
      window.location.href = "https://tonlien.com"; // remplace par ton vrai lien
    });
  </script>
</body>
</html>
