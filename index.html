<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINKFLOW002</title>
  <link rel="stylesheet" href="style.css">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>

<div class="container">
  <h1>LINKFLOW002</h1>

  <h3>Inscription</h3>
  <form class="form" onsubmit="event.preventDefault(); signup();">
    <input id="username" placeholder="Nom d'utilisateur" required>
    <input id="email" type="email" placeholder="Adresse mail" required>
    <div class="password-box">
      <input id="password" type="password" placeholder="Mot de passe" required>
      <span class="eye" onclick="togglePassword()">👁</span>
    </div>
    <button type="submit">Inscription</button>
  </form>

  <h3>Connexion</h3>
  <form class="form" onsubmit="event.preventDefault(); login();">
    <input id="loginEmail" type="email" placeholder="Adresse mail" required>
    <input id="loginPassword" type="password" placeholder="Mot de passe" required>
    <button type="submit">Connexion</button>
  </form>

  <div class="form actions">
    <button onclick="logout()">Déconnexion</button>
    <button onclick="resetPassword()">Mot de passe oublié</button>
  </div>

  <div class="popup" id="popup">
    <h3>Compte créé avec succès</h3>
    <p>
      Regardez la vidéo pour étendre votre réseau.<br>
      Le chrono démarre dès que la vidéo est lancée.<br>
      Si la vidéo est interrompue, le chrono revient à zéro.
    </p>
  </div>

  <div id="videoBox">
    <h2>Regarder la vidéo</h2>
    <div id="player"></div>
    <div class="timer">
      Temps restant : <span id="time">180</span> secondes
    </div>
    <button id="claimBtn" disabled onclick="claim()">
      J'obtiens le lien Victory Automatic
    </button>
  </div>

  <div id="linkZone"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://xkyynzbbatglctgdtqyu.supabase.co",
  "sb_publishable_WdZlyuanXIGrg8RdcKcg_w_kN7YyO9a" // ✅ ta vraie Publishable anon key
);

let timer = 180;
let interval = null;
let player;
let sessionId = null;

function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

async function signup() {
  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) { alert(error.message); return; }

  await supabaseClient.from("profiles").insert({ id: data.user.id, username });
  showPopup();
}

async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) { alert(error.message); return; }

  document.getElementById("videoBox").style.display = "block";
  createVideoSession();
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

async function resetPassword() {
  const email = document.getElementById("loginEmail").value;
  if (!email) { alert("Entrez votre email de connexion"); return; }
  await supabaseClient.auth.resetPasswordForEmail(email);
  alert("Email envoyé");
}

function showPopup() {
  const popup = document.getElementById("popup");
  popup.style.display = "block";
  setTimeout(async () => {
    popup.style.display = "none";
    document.getElementById("videoBox").style.display = "block";
    await createVideoSession();
  }, 10000);
}

async function createVideoSession() {
  const { data: authData } = await supabaseClient.auth.getUser();
  const { data } = await supabaseClient
    .from("video_sessions")
    .insert({ user_id: authData.user.id, status: "active" })
    .select()
    .single();
  sessionId = data.id;
}

function startTimer() {
  clearInterval(interval);
  timer = 180;
  document.getElementById("claimBtn").disabled = true;
  document.getElementById("time").innerText = timer;

  interval = setInterval(() => {
    timer--;
    document.getElementById("time").innerText = timer;
    if (timer <= 0) {
      clearInterval(interval);
      document.getElementById("claimBtn").disabled = false;
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(interval);
  timer = 180;
  document.getElementById("time").innerText = timer;
  document.getElementById("claimBtn").disabled = true;
}

async function claim() {
  const response = await fetch(
    "https://xkyynzbbatglctgdtqyu.supabase.co/functions/v1/dynamic-handler",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId })
    }
  );

  if (response.ok) {
    document.getElementById("linkZone").innerHTML = `
      <h3>Coller votre lien Victory</h3>
      <input id="victoryLink" placeholder="Lien Victory Automatic">
      <button onclick="validateVictoryLink()">Valider le lien</button>
    `;
  } else {
    alert("180 secondes non validées");
  }
}

function validateVictoryLink() {
  const link = document.getElementById("victoryLink").value;
  if (!link) { alert("Collez votre lien Victory"); return; }
  alert("Lien enregistré. Vérification généalogique en cours.");
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    videoId: "9uPybhkqYw4", // ✅ ta vidéo YouTube
    events: { onStateChange: onPlayerStateChange }
  });
}

function onPlayerStateChange(event) {
  const state = event.data;
  if (state === 1) startTimer();
  if (state === 2) resetTimer();
}
</script>

<!-- Enregistrement du Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .then(() => console.log("Service Worker enregistré"))
    .catch(err => console.error("Erreur SW:", err));
}
</script>

</body>
</html>
