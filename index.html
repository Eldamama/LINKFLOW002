<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LinkFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#111; color:#fff; font-family:sans-serif; text-align:center;">

  <!-- Logo et titre -->
  <h1 style="color:gold;">Logo LinkFlow</h1>
  <h2>L’écosystème qui propulse votre réseau</h2>

  <!-- Formulaire de connexion -->
  <form id="loginForm" style="margin-top:30px;">
    <input type="email" id="email" placeholder="Email" required style="padding:10px; margin:5px;">
    <input type="password" id="password" placeholder="Mot de passe" required style="padding:10px; margin:5px;">
    <button type="submit" style="padding:10px; margin:5px; background:green; color:white;">Connexion</button>
  </form>

  <!-- Firebase SDKs depuis CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-analytics.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database.js"></script>

  <script>
    // Configuration Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
      authDomain: "linkflow-7a82a.firebaseapp.com",
      databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "linkflow-7a82a",
      storageBucket: "linkflow-7a82a.firebasestorage.app",
      messagingSenderId: "459654757296",
      appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475",
      measurementId: "G-THW9XMEJTX"
    };

    // Initialisation Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const analytics = firebase.analytics();
    const auth = firebase.auth();
    const db = firebase.database();

    console.log("Firebase initialisé :", app.name);

    // Gestion du formulaire de connexion
    const loginForm = document.getElementById("loginForm");
    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          console.log("Connexion réussie :", userCredential.user);
          alert("Bienvenue " + userCredential.user.email);
        })
        .catch(error => {
          console.error("Erreur de connexion :", error);
          alert("Erreur : " + error.message);
        });
    });
  </script>

</body>
</html>
