<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LINK FLOW - Authentification</title>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <!-- YouTube API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    #player, #actionsSection, #linkSection, #notification {
      display: none;
      margin-top: 20px;
    }
    #notification {
      color: green;
      font-weight: bold;
    }
    #linkSection a {
      color: blue;
      font-weight: bold;
      text-decoration: underline;
    }
    input, select {
      display: block;
      margin: 5px 0;
      padding: 8px;
    }
    button {
      margin: 5px 0;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1 id="titrePrincipal">Bienvenue sur LINK FLOW</h1>
  <p id="sousTitre">Authentification avec Firebase</p>

  <!-- Sélecteur de langue -->
  <label for="langSelect">🌐 Langue / Language:</label>
  <select id="langSelect">
    <option value="fr">Français</option>
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="pt">Português</option>
    <option value="ln">Lingala</option>
    <option value="sw">Swahili</option>
  </select>

  <!-- Formulaire d'inscription -->
  <h2 id="titreInscription">Inscription</h2>
  <form onsubmit="event.preventDefault(); inscrire();">
    <label for="emailInscription" id="labelEmailInscription">Email :</label>
    <input type="email" id="emailInscription" placeholder="Votre email" required>
    <label for="mdpInscription" id="labelMdpInscription">Mot de passe :</label>
    <input type="password" id="mdpInscription" placeholder="Votre mot de passe" required>
    <button type="submit" id="btnInscrire">S’inscrire</button>
  </form>

  <!-- Formulaire de connexion -->
  <h2 id="titreConnexion">Connexion</h2>
  <form onsubmit="event.preventDefault(); connecter();">
    <label for="emailConnexion" id="labelEmailConnexion">Email :</label>
    <input type="email" id="emailConnexion" placeholder="Votre email" required>
    <label for="mdpConnexion" id="labelMdpConnexion">Mot de passe :</label>
    <input type="password" id="mdpConnexion" placeholder="Votre mot de passe" required>
    <button type="submit" id="btnConnecter">Se connecter</button>
  </form>

  <!-- Bouton de déconnexion -->
  <h2 id="titreDeconnexion">Déconnexion</h2>
  <button onclick="deconnecter()" id="btnDeconnecter">Se déconnecter</button>

  <!-- Notification après connexion -->
  <div id="notification"></div>

  <!-- Vidéo YouTube -->
  <h2 id="titreVideo">Visionnez la vidéo pour débloquer les actions</h2>
  <div id="player"></div>

  <!-- Actions Like & Comment -->
  <div id="actionsSection">
    <button id="likeBtn">👍 Liker</button>
    <button id="commentBtn">💬 Commenter</button>
  </div>

  <!-- Lien caché -->
  <div id="linkSection">
    <p id="msgBravo">Bravo, vous avez terminé la vidéo et interagi !</p>
    <a href="https://victoryautomatic.com/user/register/okoningana" target="_blank" id="btnAcces">Accéder à Victor Automatic</a>
  </div>

  <script>
    // Config Firebase
    var firebaseConfig = {
      apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
      authDomain: "linkflow-7a82a.firebaseapp.com",
      databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "linkflow-7a82a",
      storageBucket: "linkflow-7a82a.firebasestorage.app",
      messagingSenderId: "459654757296",
      appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475",
      measurementId: "G-THW9XMEJTX"
    };
    firebase.initializeApp(firebaseConfig);

    // Inscription
    function inscrire() {
      const email = document.getElementById("emailInscription").value;
      const mdp = document.getElementById("mdpInscription").value;
      firebase.auth().createUserWithEmailAndPassword(email, mdp)
        .then(u => alert("Inscription réussie : " + u.user.email))
        .catch(e => alert("Erreur : " + e.message));
    }

    // Connexion
    function connecter() {
      const email = document.getElementById("emailConnexion").value;
      const mdp = document.getElementById("mdpConnexion").value;
      firebase.auth().signInWithEmailAndPassword(email, mdp)
        .then(u => alert("Connexion réussie : " + u.user.email))
        .catch(e => alert("Erreur : " + e.message));
    }

    // Déconnexion
    function deconnecter() {
      firebase.auth().signOut()
        .then(() => alert("Déconnexion réussie"))
        .catch(e => alert("Erreur : " + e.message));
    }

    // Surveiller état utilisateur
    let langActuelle = "fr";
    document.getElementById("langSelect").addEventListener("change", e => {
      langActuelle = e.target.value;
    });

    firebase.auth().onAuthStateChanged(utilisateur => {
      if (utilisateur) {
        document.getElementById("notification").style.display = "block";
        document.getElementById("notification").innerText = traductions[langActuelle].notification;
        document.getElementById("player").style.display = "block";
      } else {
        document.getElementById("notification").style.display = "none";
        document.getElementById("player").style.display = "none";
        document.getElementById("actionsSection").style.display = "none";
        document.getElementById("linkSection").style.display = "none";
      }
    });

    // YouTube API
    var player;
    let videoTerminee = false;
    let interactionFaite = false;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '240',
        width: '320',
        videoId: '9uPybhkqYw4', // ID réel de ta vidéo YouTube
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        videoTerminee = true;
        document.getElementById("actionsSection").style.display = "block";
      }
    }

    function verifierAcces() {
      if (videoTerminee && interactionFaite) {
        document.getElementById("linkSection").style.display = "block";
      }
    }

    document.getElementById("likeBtn").addEventListener("click", () => {
      interactionFaite = true;
      verifierAcces();
    });
    document.getElementById("commentBtn").addEventListener("click", () => {
      interactionFaite = true;
      verifierAcces();
    });

    // Traductions multilingues
    const traductions = {
      fr: {
        notification: "✅ Vous êtes connecté à LINK FLOW ! Pour accéder à Victor Automatic, vous devez d’abord regarder la vidéo et interagir (like ou commentaire). Cette étape est essentielle : elle permet de stimuler l’algorithme YouTube, d’augmenter la visibilité de notre contenu et d’assurer la vitalité et la progression collective du réseau."
      },
      en: {
        notification: "✅ You are logged in to LINK FLOW! To access Victor Automatic, you must first watch the video and interact (like or comment). This step is crucial: it helps activate the YouTube algorithm, boost our content’s visibility, and ensure the network’s collective vitality and growth."
      },
      es: {
        notification: "✅ ¡Has iniciado sesión en LINK FLOW! Para acceder
