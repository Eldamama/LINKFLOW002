<div class="container">
    <div id="step-registration">
        <h2>🔗 Inscription LINKFLOW</h2>
        <input type="text" id="username" placeholder="Pseudo">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="ref_code" readonly>
        <button class="btn" onclick="sinscrire()">S'INSCRIRE MAINTENANT</button>
    </div>

    <div id="step-youtube" class="hidden">
        <div class="flash-frame">
            <h3 style="color: #ef4444;">COMPTE CRÉÉ AVEC SUCCÈS !</h3>
            <p>Imprégnez-vous de cette opportunité...</p>
        </div>
        
        <button id="btn-video" class="btn hidden" onclick="handleYoutube()">VOIR LA VIDÉO (3 min)</button>
        <div id="timer-display" class="hidden">180s</div>
    </div>

    <div id="step-victory" class="hidden">
        <h3>✅ Temps Écoulé</h3>
        <button class="btn" onclick="openVictory()">S'INSCRIRE SUR VICTORY</button>
        <input type="text" id="victory-link-input" placeholder="Collez votre lien Victory ici">
        <button class="btn" onclick="activerMonLien()">ACTIVER MON SYSTÈME</button>
    </div>
</div>
