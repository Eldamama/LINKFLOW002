<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LINK FLOW - Authentification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Petit style rapide pour positionner l'œil */
    .password-container { position: relative; width: 100%; }
    .password-container i {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Inscription</h2>
    <form id="signup-form">
      <label for="username">Pseudo</label>
      <input type="text" id="username" placeholder="Votre pseudo" required>

      <label for="signup-email">Adresse e‑mail</label>
      <input type="email" id="signup-email" placeholder="exemple@mail.com" required>

      <label for="signup-password">Mot de passe</label>
      <div class="password-container">
        <input type="password" id="signup-password" placeholder="••••••••" required>
        <i class="fa-solid fa-eye toggle-password" data-target="signup-password"></i>
      </div>

      <button type="submit">S’inscrire</button>
    </form>

    <hr>

    <h2>Connexion</h2>
    <form id="login-form">
      <label for="login-email">Adresse e‑mail</label>
      <input type="email" id="login-email" required>

      <label for="login-password">Mot de passe</label>
      <div class="password-container">
        <input type="password" id="login-password" required>
        <i class="fa-solid fa-eye toggle-password" data-target="login-password"></i>
      </div>

      <button type="submit">Se connecter</button>
    </form>

    <div class="actions">
      <button id="logout-btn">Déconnexion</button>
      <button id="forgot-btn">Mot de passe oublié</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
