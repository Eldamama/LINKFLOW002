<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELDAMAMA TEST</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { background:#000; color:#fff; font-family:system-ui, sans-serif; text-align:center; }
    #overlay { position:fixed; inset:0; background:#000; z-index:100; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:12px; }
    .btn-lang { width:85%; max-width:300px; padding:15px; background:transparent; border:2px solid #d4af37; color:#d4af37; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; }
    .btn-lang:active { background:rgba(212,175,55,0.2); }
    
    #app { display:none; padding:20px; max-width:480px; margin:0 auto; }
    .card { background:#111; padding:20px; border-radius:12px; margin-top:10px; border:1px solid #333; }
    input { width:100%; padding:12px; margin:6px 0; background:#000; border:1px solid #d4af37; color:#fff; border-radius:6px; font-size:16px; }
    .btn { width:100%; padding:14px; background:#d4af37; color:#000; border:none; border-radius:6px; font-weight:bold; font-size:16px; margin-top:10px; cursor:pointer; }
    .hidden { display:none !important; }
    a { color:#d4af37; text-decoration:none; }
    
    #debug { position:fixed; bottom:0; left:0; width:100%; background:#1a1a1a; color:#0f0; padding:8px; font-size:12px; text-align:left; z-index:200; border-top:1px solid #333; }
  </style>
</head>
<body>

  <div id="overlay">
    <h2 style="color:#d4af37; margin-bottom:10px;">Choisis ta langue</h2>
    <button class="btn-lang" onclick="start('fr')">FRANÇAIS 🇫🇷</button>
    <button class="btn-lang" onclick="start('en')">ENGLISH 🇺🇸</button>
    <button class="btn-lang" onclick="start('ln')">LINGALA 🇨🇩</button>
  </div>

  <div id="app">
    <h1 style="color:#d4af37; margin-bottom:20px;">ELDAMAMA</h1>
    
    <div id="signup-box" class="card">
      <h2 id="title-s">Inscription</h2>
      <form id="form-s">
        <input id="s-name" type="text" placeholder="Nom" required>
        <input id="s-email" type="email" placeholder="Email" required>
        <input id="s-pass" type="password" placeholder="Mot de passe (min 6)" minlength="6" required>
        <button type="submit" class="btn" id="btn-s">Créer compte</button>
      </form>
      <p style="margin-top:10px;"><a href="#" onclick="swap('login')">Déjà membre ? Connexion</a></p>
    </div>

    <div id="login-box" class="card hidden">
      <h2>Connexion</h2>
      <form id="form-l">
        <input id="l-email" type="email" placeholder="Email" required>
        <input id="l-pass" type="password" placeholder="Mot de passe" required>
        <button type="submit" class="btn">Se connecter</button>
      </form>
      <p style="margin-top:10px;"><a href="#" onclick="swap('signup')">Nouveau ? Inscription</a></p>
    </div>
  </div>

  <div id="debug">⏳ Chargement...</div>

  <script>
    function log(msg) {
      document.getElementById('debug').innerText = msg;
      console.log(msg);
    }

    function start(lang) {
      try {
        log('🌐 Langue sélectionnée : ' + lang);
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        
        // Traductions rapides
        const texts = {
          fr: { t:"Inscription", b:"Créer compte" },
          en: { t:"Sign Up", b:"Create Account" },
          ln: { t:"Komisa", b:"Tia compte" }
        };
        const t = texts[lang] || texts.en;
        document.getElementById('title-s').innerText = t.t;
        document.getElementById('btn-s').innerText = t.b;
        
        localStorage.setItem('lang', lang);
        log('✅ Interface affichée. Prêt à tester.');
      } catch(e) {
        log('❌ ERREUR: ' + e.message);
        alert('Erreur JS : ' + e.message);
      }
    }

    function swap(mode) {
      const s = document.getElementById('signup-box');
      const l = document.getElementById('login-box');
      if(mode === 'login') { s.classList.add('hidden'); l.classList.remove('hidden'); log('🔄 Affiche Connexion'); }
      else { l.classList.add('hidden'); s.classList.remove('hidden'); log('🔄 Affiche Inscription'); }
      return false; // Empêche le rechargement de page
    }

    // Attendre que le DOM soit prêt
    window.addEventListener('load', function() {
      log('📱 Page chargée ✅');
      
      // Inscription
      document.getElementById('form-s').addEventListener('submit', function(e) {
        e.preventDefault();
        log('📤 Envoi formulaire inscription...');
        const btn = document.getElementById('btn-s');
        btn.disabled = true; btn.innerText = '⏳...';
        
        setTimeout(() => {
          alert('✅ COMPTE CRÉÉ (Mode démo)\n\nLe formulaire fonctionne parfaitement.');
          log('✅ Succès inscription démo');
          document.getElementById('form-s').reset();
          btn.disabled = false; btn.innerText = 'Créer compte';
        }, 800);
      });

      // Connexion
      document.getElementById('form-l').addEventListener('submit', function(e) {
        e.preventDefault();
        log('📤 Envoi formulaire connexion...');
        setTimeout(() => {
          alert('✅ CONNEXION RÉUSSIE (Mode démo)');
          log('✅ Succès connexion démo');
          document.getElementById('form-l').reset();
        }, 800);
      });
    });
  </script>
</body>
</html>
