<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINK FLOW - Officiel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background: #f8f9fa; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 420px; margin: 20px auto; text-align: center; position: relative; }
        
        .logo-flow { width: 70px; height: 70px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 35px; font-weight: bold; }

        /* MAINTENANCE */
        #maintenanceSection { display: none; background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; border: 1px solid #ffeeba; margin-bottom: 20px; font-size: 14px; }

        /* INPUTS & PASSWORD EYE */
        .input-group { position: relative; width: 100%; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .eye-icon { position: absolute; right: 15px; top: 25px; cursor: pointer; color: #666; z-index: 10; }

        .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; display: block; text-decoration: none; margin-top: 10px; box-sizing: border-box; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; margin: 20px 0; }
        .btn-dark { background: #222; color: white; }
        .btn-success { background: var(--success); color: white; display: none; margin-top: 25px; }

        .forgot-link { display: block; font-size: 12px; margin-top: 10px; color: var(--primary); cursor: pointer; text-decoration: underline; }
        #generatorSection, #actionsSection, #btnDeconnect, #resultBox, .video-container { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="maintenanceSection">⚠️ SYSTÈME EN MAINTENANCE. REVENER BIENTÔT !</div>
        
        <div class="logo-flow">⚡</div>
        <h2>LINK FLOW</h2>
        <div id="status" style="font-size:12px; margin-bottom:10px;">Veuillez vous identifier</div>

        <div id="authSection">
            <input type="email" id="emailInput" placeholder="Email">
            <div class="input-group">
                <input type="password" id="mdpInput" placeholder="Mot de passe">
                <span class="eye-icon" onclick="toggleMdp()">👁️</span>
            </div>
            <button class="btn btn-blue" onclick="connecter()">SE CONNECTER</button>
            <a class="forgot-link" onclick="recupererMdp()">Mot de passe oublié ?</a>
            <button style="background:none; border:none; color:#777; margin-top:15px; font-size:13px;" onclick="inscrire()">Créer un compte</button>
        </div>

        <div id="generatorSection">
            <input type="text" id="v_link_input" placeholder="Lien Victory Automatic ici...">
            <button id="btnGenerate" class="btn btn-blue" onclick="generateLink()">GÉNÉRER MON LIEN</button>
            <div id="resultBox" style="margin-top:15px; background:#f0fff4; padding:15px; border-radius:10px; border: 1px solid #cdf0d5;">
                <code id="displayLink" style="font-weight:bold; color:var(--danger); word-break:break-all;"></code>
            </div>
        </div>

        <div id="actionsSection">
            <a href="https://www.youtube.com/watch?v=9uPybhkqYw4" target="_blank" class="btn btn-red" onclick="interactionFaite=true">🔴 ÉTAPE 1 : AGIR SUR YOUTUBE</a>
            <div class="video-container" id="videoBox" style="display:block; position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px;">
                <div id="player" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
            </div>
            <button class="btn btn-dark" style="margin-top:20px;" onclick="verifierAcces()">ÉTAPE 2 : VÉRIFIER L'ACCÈS</button>
        </div>

        <a id="dynamicFinalLink" href="#" target="_blank" class="btn btn-success">🚀 S'INSCRIRE MAINTENANT</a>

        <button id="btnDeconnect" style="background:none; border:none; color:#aaa; width:100%; margin-top:30px; font-size:12px;" onclick="deconnecter()">DÉCONNEXION</button>
    </div>

    <script>
        // --- BOUTON D'ARRÊT ---
        var SYSTEME_ARRETE = false; // Mettre sur 'true' pour tout bloquer

        if (SYSTEME_ARRETE) {
            document.getElementById("maintenanceSection").style.display = "block";
            document.getElementById("authSection").style.display = "none";
            document.getElementById("status").innerText = "Mode Maintenance";
        }

        var firebaseConfig = {
            apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
            authDomain: "linkflow-7a82a.firebaseapp.com",
            databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "linkflow-7a82a",
            storageBucket: "linkflow-7a82a.firebasestorage.app",
            messagingSenderId: "459654757296",
            appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475"
        };
        firebase.initializeApp(firebaseConfig);

        let videoTerminee = false;
        let interactionFaite = false;

        function toggleMdp() {
            const m = document.getElementById("mdpInput");
            m.type = m.type === "password" ? "text" : "password";
        }

        function recupererMdp() {
            const e = document.getElementById("emailInput").value.trim();
            if(!e) return alert("Tapez votre email d'abord");
            firebase.auth().sendPasswordResetEmail(e).then(() => alert("Lien envoyé par email !"));
        }

        function inscrire() {
            const e = document.getElementById("emailInput").value.trim();
            const m = document.getElementById("mdpInput").value;
            firebase.auth().createUserWithEmailAndPassword(e, m).catch(err => alert(err.message));
        }

        function connecter() {
            const e = document.getElementById("emailInput").value.trim();
            const m = document.getElementById("mdpInput").value;
            firebase.auth().signInWithEmailAndPassword(e, m).catch(err => alert(err.message));
        }

        function deconnecter() { firebase.auth().signOut().then(() => location.reload()); }

        firebase.auth().onAuthStateChanged(user => {
            if (user && !SYSTEME_ARRETE) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("generatorSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "block";
                document.getElementById("btnDeconnect").style.display = "block";
                document.getElementById("status").innerText = "Membre : " + user.email;
                checkAccess(user.email);
            }
        });

        function checkAccess(email) {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref');
            if (email !== "lobongoaime@gmail.com" && !ref) {
                document.getElementById("btnGenerate").disabled = true;
                document.getElementById("btnGenerate").style.opacity = "0.3";
            } else if (ref) {
                document.getElementById("dynamicFinalLink").href = "https://victoryautomatic.com/user/register/" + ref;
            }
        }

        function generateLink() {
            const val = document.getElementById("v_link_input").value.trim();
            if(val.includes('victoryautomatic.com/user/register/')) {
                const pseudo = val.split('/').filter(Boolean).pop();
                document.getElementById("displayLink").innerText = window.location.origin + window.location.pathname + "?ref=" + pseudo;
                document.getElementById("resultBox").style.display = "block";
            }
        }

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '9uPybhkqYw4',
                events: { 'onStateChange': e => { if(e.data === YT.PlayerState.ENDED) videoTerminee = true; } }
            });
        }

        function verifierAcces() {
            if (interactionFaite) {
                document.getElementById("actionsSection").style.display = "none";
                document.getElementById("dynamicFinalLink").style.display = "block";
            } else { alert("Cliquez sur le bouton rouge YouTube !"); }
        }
    </script>
</body>
</html>
