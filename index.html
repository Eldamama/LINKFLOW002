<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKFLOW</title>
    <style>
        /* --- DESIGN GLOBAL --- */
        * { box-sizing: border-box; margin:0; padding:0; }
        body { background:#000; color:#fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-align:center; }
        
        .main-logo { max-width: 180px; height: auto; margin-bottom: 10px; }

        /* Écrans */
        #overlay { position:fixed; inset:0; background:#000; z-index:100; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:12px; padding:20px; }
        #app { display:none; padding:20px; max-width:450px; margin:0 auto; }
        .card { background:#111; padding:25px; border-radius:15px; margin-top:10px; border:1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Langues */
        .btn-lang { width:100%; max-width:300px; padding:14px; background:transparent; border:1px solid #d4af37; color:#d4af37; border-radius:10px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition: 0.3s; }
        .btn-lang:hover { background: rgba(212,175,55,0.1); }

        /* Formulaires */
        label { display:block; text-align:left; font-size:12px; color:#d4af37; margin-bottom:5px; font-weight:bold; text-transform: uppercase; }
        input { width:100%; padding:14px; background:#050505; border:1px solid #333; color:#fff; border-radius:8px; margin-bottom:15px; font-size:16px; }
        input:focus { border-color: #d4af37; outline:none; }

        /* Boutons */
        .btn { width:100%; padding:16px; background:#d4af37; color:#000; border:none; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background:#333; color:#666; cursor:not-allowed; }
        .btn-green { background:#28a745; color:#fff; }
        .btn-outline { background:transparent; border:1px solid #d4af37; color:#d4af37; margin-top:10px; }

        /* Vidéo */
        .video-wrapper { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:8px; border:1px solid #333; margin-bottom:15px; }
        .video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; }

        /* Étapes */
        .step-indicator { display:flex; justify-content:center; gap:8px; margin-bottom:20px; }
        .step { width:10px; height:10px; border-radius:50%; background:#333; }
        .step.active { background:#d4af37; box-shadow: 0 0 8px #d4af37; }
        .step.done { background:#28a745; }

        .hidden { display:none !important; }
        .monospace { font-family:monospace; color:#d4af37; background:#000; padding:10px; border-radius:5px; border:1px dashed #444; word-break:break-all; }
    </style>
</head>
<body>

    <div id="overlay">
        <img src="https://i.ibb.co/bW343Y2/BCO-d4c3aa9d-334b-4a79-8053-0d545cd94195-removebg-preview.png" alt="Logo" class="main-logo">
        <button class="btn-lang" onclick="initApp('fr')">🇫🇷 FRANÇAIS</button>
        <button class="btn-lang" onclick="initApp('en')">🇺🇸 ENGLISH</button>
        <button class="btn-lang" onclick="initApp('ar')">🇸🇦 العربية</button>
        <button class="btn-lang" onclick="initApp('pt')">🇵🇹 PORTUGUÊS</button>
        <button class="btn-lang" onclick="initApp('es')">🇪🇸 ESPAÑOL</button>
        <button class="btn-lang" onclick="initApp('sw')">🇰🇪 SWAHILI</button>
    </div>

    <div id="app">
        <div class="step-indicator">
            <div class="step active" id="step-1"></div>
            <div class="step" id="step-2"></div>
            <div class="step" id="step-3"></div>
            <div class="step" id="step-4"></div>
        </div>

        <div id="auth-section" class="card">
            <h2 id="auth-title" style="color:#d4af37; margin-bottom:10px;">Inscription</h2>
            <p id="auth-desc" style="font-size:13px; color:#888; margin-bottom:20px;"></p>
            
            <label id="lbl-email">Email</label>
            <input id="u-email" type="email" placeholder="votre@email.com">
            
            <label id="lbl-pass">Mot de passe</label>
            <input id="u-pass" type="password" placeholder="******">
            
            <button class="btn" id="btn-auth" onclick="handleAuth()">Continuer</button>
            <p style="margin-top:15px; font-size:13px;"><a href="#" onclick="toggleAuthMode(); return false;" id="auth-switch" style="color:#d4af37; text-decoration:none;">Déjà membre ? Connexion</a></p>
        </div>

        <div id="video-section" class="card hidden">
            <h2 id="vid-title" style="color:#d4af37;">Etape 2</h2>
            <p id="vid-desc" style="font-size:13px; margin-bottom:15px;"></p>
            <div class="video-wrapper">
                <iframe id="yt-frame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div id="timer-display" style="color:#ff4444; font-weight:bold; margin-bottom:10px;"></div>
            <button id="btn-video-done" class="btn btn-green" disabled>Chargement...</button>
        </div>

        <div id="link-section" class="card hidden">
            <h2 id="sponsor-title" style="color:#d4af37;">Etape 3</h2>
            <p id="sponsor-desc" style="font-size:13px; margin-bottom:15px;"></p>
            <div id="sponsor-box" class="monospace"></div>
            <button class="btn btn-green" style="margin-top:20px;" onclick="openSponsorLink()" id="btn-go-victory">🚀 ALLER SUR VICTORY</button>
            <button class="btn btn-outline" onclick="showValidation()" id="btn-have-donated">J'AI DÉJÀ FAIT MON DON</button>
        </div>

        <div id="val-section" class="card hidden">
            <h2 id="val-title" style="color:#d4af37;">Etape 4</h2>
            <p id="val-desc" style="font-size:13px; margin-bottom:15px;"></p>
            <input id="v-link" type="text" placeholder="https://victory-monde.com/register?ref=...">
            <button class="btn btn-green" onclick="finalValidation()" id="btn-activate-lf">ACTIVER MON LIEN</button>
            <div id="final-msg" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 🔑 ==================================================================
        // ⚠️ REMPLACEZ CES 2 LIGNES PAR VOS PROPRES IDENTIFIANTS SUPABASE
        // ==================================================================
        const SUPABASE_URL = 'https://VOTRE-PROJET.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; 
        // ==================================================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const YOUTUBE_ID = '9uPybhkqYw4'; 
        const ROOT_REF = 'okoningana';
        const VIDEO_DURATION = 180; 

        let currentLang = 'fr';
        let isLoginMode = false;
        let sponsor = ROOT_REF;
        let currentUserEmail = '';
        let session = null; // Stocke la session active Supabase

        const dict = {
            fr: {
                login: "Connexion", signup: "Inscription", authDescL: "Entrez vos accès pour continuer.", authDescS: "Créez votre compte LinkFlow sans plus attendre.",
                lblEmail: "Email", lblPass: "Mot de passe", authSwitchL: "Nouveau ? Inscription", authSwitchS: "Déjà membre ? Connexion",
                vidTitle: "ÉTAPE OBLIGATOIRE", vidDesc: "Regardez cette vidéo de 3 minutes pour débloquer votre accès.", vidBtnWait: "Attendez {s}s...", vidBtnDone: "J'ai fini de regarder",
                sponsorTitle: "Votre Parrain", sponsorDesc: "Inscrivez-vous sur Victory via ce lien pour rejoindre l'équipe :", btnVictory: "🚀 ALLER SUR VICTORY", btnDonated: "J'AI DÉJÀ FAIT MON DON",
                valTitle: "Validation", valDesc: "Collez votre lien Victory personnel obtenu après votre don :", btnActivate: "ACTIVER LINKFLOW",
                valValid: "🎉 FÉLICITATIONS ! Votre lien est actif.", valInvalid: "❌ Lien Victory non reconnu.", valShare: "Votre lien de parrainage :"
            },
            en: {
                login: "Login", signup: "Sign Up", authDescL: "Enter your credentials to continue.", authDescS: "Create your LinkFlow account now.",
                lblEmail: "Email", lblPass: "Password", authSwitchL: "New? Sign Up", authSwitchS: "Member? Login",
                vidTitle: "MANDATORY STEP", vidDesc: "Watch this 3-minute video to unlock access.", vidBtnWait: "Wait {s}s...", vidBtnDone: "I finished watching",
                sponsorTitle: "Your Sponsor", sponsorDesc: "Register on Victory using this link to join the team:", btnVictory: "🚀 GO TO VICTORY", btnDonated: "I HAVE ALREADY DONATED",
                valTitle: "Validation", valDesc: "Paste your personal Victory link obtained after your donation:", btnActivate: "ACTIVATE LINKFLOW",
                valValid: "🎉 CONGRATULATIONS! Your link is active.", valInvalid: "❌ Victory link not recognized.", valShare: "Your referral link:"
            },
            ar: {
                login: "تسجيل الدخول", signup: "إنشاء حساب", authDescL: "أدخل بياناتك للمتابعة.", authDescS: "أنشئ حساب LinkFlow الآن.",
                lblEmail: "البريد الإلكتروني", lblPass: "كلمة المرور", authSwitchL: "جديد؟ إنشاء حساب", authSwitchS: "عضو؟ تسجيل الدخول",
                vidTitle: "خطوة إلزامية", vidDesc: "شاهد هذا الفيديو لمدة 3 دقائق لفتح الوصول.", vidBtnWait: "انتظر {s} ثانية...", vidBtnDone: "لقد انتهيت من المشاهدة",
                sponsorTitle: "كفيلك", sponsorDesc: "سجل في Victory عبر هذا الرابط للانضمام إلى الفريق:", btnVictory: "🚀 اذهب إلى VICTORY", btnDonated: "لقد تبرعت بالفعل",
                valTitle: "التحقق", valDesc: "الصق رابط Victory الخاص بك الذي حصلت عليه بعد تبرعك:", btnActivate: "تفعيل LINKFLOW",
                valValid: "🎉 تهانينا! رابطك نشط الآن.", valInvalid: "❌ رابط Victory غير معترف به.", valShare: "رابط الإحالة الخاص بك:"
            },
            pt: {
                login: "Entrar", signup: "Cadastrar", authDescL: "Entre com seus dados para continuar.", authDescS: "Crie sua conta LinkFlow agora.",
                lblEmail: "Email", lblPass: "Senha", authSwitchL: "Novo? Cadastrar", authSwitchS: "Membro? Entrar",
                vidTitle: "ETAPA OBRIGATÓRIA", vidDesc: "Assista a este vídeo de 3 minutos para desbloquear.", vidBtnWait: "Aguarde {s}s...", vidBtnDone: "Terminei de assistir",
                sponsorTitle: "Seu Patrocinador", sponsorDesc: "Cadastre-se na Victory por este link para entrar no time:", btnVictory: "🚀 IR PARA VICTORY", btnDonated: "JÁ FIZ MINHA DOAÇÃO",
                valTitle: "Validação", valDesc: "Cole seu link Victory pessoal após a doação:", btnActivate: "ATIVAR LINKFLOW",
                valValid: "🎉 PARABÉNS! Seu link está ativo.", valInvalid: "❌ Link Victory inválido.", valShare: "Seu link de indicação:"
            },
            es: {
                login: "Entrar", signup: "Registro", authDescL: "Inicie sesión para continuar.", authDescS: "Cree su cuenta LinkFlow ahora.",
                lblEmail: "Email", lblPass: "Contraseña", authSwitchL: "¿Nuevo? Registro", authSwitchS: "¿Ya es miembro? Entrar",
                vidTitle: "PASO OBLIGATORIO", vidDesc: "Mira este video de 3 minutos para desbloquear.", vidBtnWait: "Espera {s}s...", vidBtnDone: "He terminado de ver",
                sponsorTitle: "Tu Patrocinador", sponsorDesc: "Regístrate en Victory con este enlace para unirte:", btnVictory: "🚀 IR A VICTORY", btnDonated: "YA HE DONADO",
                valTitle: "Validación", valDesc: "Pega tu enlace de Victory obtenido tras tu donación:", btnActivate: "ACTIVAR LINKFLOW",
                valValid: "🎉 ¡FELICIDADES! Tu enlace está activo.", valInvalid: "❌ Enlace de Victory no válido.", valShare: "Tu enlace de referido:"
            },
            sw: {
                login: "Ingia", signup: "Jiandikishe", authDescL: "Ingia ili kuendelea.", authDescS: "Fungua akaunti ya LinkFlow sasa.",
                lblEmail: "Email", lblPass: "Nenosiri", authSwitchL: "Mgeni? Jiandikishe", authSwitchS: "Mwanachama? Ingia",
                vidTitle: "HATUA YA LAZIMA", vidDesc: "Tazama video hii ya dakika 3 ili uendelee.", vidBtnWait: "Subiri {s}s...", vidBtnDone: "Nimemaliza kutazama",
                sponsorTitle: "Mfadhili Wako", sponsorDesc: "Jiandikishe Victory kupitia kiungo hiki kujiunga:", btnVictory: "🚀 NENDA VICTORY", btnDonated: "TAYARI NIMETOA",
                valTitle: "Uthibitisho", valDesc: "Bandika kiungo chako cha Victory ulichopata baada ya kutoa:", btnActivate: "WEZESHA LINKFLOW",
                valValid: "🎉 HONGERA! Kiungo chako kimefunguliwa.", valInvalid: "❌ Kiungo cha Victory si sahihi.", valShare: "Kiungo chako cha kualika:"
            }
        };

        async function initApp(lang) {
            currentLang = lang;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) sponsor = ref;
            
            updateUI();
            await checkSession(); // Vérifie si déjà connecté au rechargement
        }

        function updateUI() {
            const t = dict[currentLang];
            document.getElementById('auth-title').innerText = isLoginMode ? t.login : t.signup;
            document.getElementById('auth-desc').innerText = isLoginMode ? t.authDescL : t.authDescS;
            document.getElementById('lbl-email').innerText = t.lblEmail;
            document.getElementById('lbl-pass').innerText = t.lblPass;
            document.getElementById('auth-switch').innerText = isLoginMode ? t.authSwitchL : t.authSwitchS;
            document.getElementById('btn-auth').innerText = isLoginMode ? t.login : t.signup;
            document.getElementById('vid-title').innerText = t.vidTitle;
            document.getElementById('vid-desc').innerText = t.vidDesc;
            document.getElementById('sponsor-title').innerText = t.sponsorTitle;
            document.getElementById('sponsor-desc').innerText = t.sponsorDesc;
            document.getElementById('sponsor-box').innerText = `🔗 ID: ${sponsor}`;
            document.getElementById('btn-go-victory').innerText = t.btnVictory;
            document.getElementById('btn-have-donated').innerText = t.btnDonated;
            document.getElementById('val-title').innerText = t.valTitle;
            document.getElementById('val-desc').innerText = t.valDesc;
            document.getElementById('btn-activate-lf').innerText = t.btnActivate;
        }

        function toggleAuthMode() { isLoginMode = !isLoginMode; updateUI(); }

        async function handleAuth() {
            const email = document.getElementById('u-email').value.trim();
            const password = document.getElementById('u-pass').value;
            const btn = document.getElementById('btn-auth');
            
            if(!email || !password) return alert("Veuillez remplir tous les champs");
            
            btn.disabled = true;
            btn.innerText = isLoginMode ? "Connexion..." : "Création...";
            
            try {
                if (isLoginMode) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    session = data.session;
                } else {
                    const { data, error } = await supabase.auth.signUp({
                        email, password,
                        options: {  { language: currentLang, sponsor_id: sponsor } }
                    });
                    if (error) throw error;
                    session = data.session;
                    
                    // Si confirmation email activée
                    if (!session) {
                        alert("✅ Compte créé ! Vérifiez votre email pour activer votre accès.");
                        btn.disabled = false;
                        btn.innerText = dict[currentLang][isLoginMode ? 'login' : 'signup'];
                        return;
                    }
                }
                
                await routeUser();
            } catch (err) {
                console.error(err);
                alert("❌ " + (err.message || "Erreur d'authentification"));
                btn.disabled = false;
                btn.innerText = dict[currentLang][isLoginMode ? 'login' : 'signup'];
            }
        }

        async function routeUser() {
            if(!session) return;
            currentUserEmail = session.user.email;
            
            const {  profile, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();
                
            if (error) throw error;
            
            // Restaurer la langue si sauvegardée
            if (profile.language) currentLang = profile.language;
            updateUI();
            
            document.getElementById('auth-section').classList.add('hidden');
            
            if (profile.account_activated) {
                updateSteps(4);
                document.getElementById('val-section').classList.remove('hidden');
                const myLink = `${window.location.origin}${window.location.pathname}?ref=${profile.my_ref_id}`;
                document.getElementById('final-msg').innerHTML = `<div style="color:#28a745; border:1px solid #28a745; padding:10px; border-radius:8px;"><b>${dict[currentLang].valValid}</b><br><br><small>${dict[currentLang].valShare}</small><br><code style="color:#d4af37;">${myLink}</code></div>`;
            } else if (profile.video_watched) {
                showSponsorStep();
            } else {
                showVideoStep();
            }
        }

        function showVideoStep() {
            updateSteps(2);
            document.getElementById('video-section').classList.remove('hidden');
            document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${YOUTUBE_ID}?autoplay=1&rel=0`;
            
            const btn = document.getElementById('btn-video-done');
            let timeLeft = VIDEO_DURATION;

            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = `⏳ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
                
                if(timeLeft > 0) {
                    btn.innerText = dict[currentLang].vidBtnWait.replace('{s}', timeLeft);
                } else {
                    clearInterval(timer);
                    document.getElementById('timer-display').innerText = "✅ Vidéo terminée";
                    btn.disabled = false;
                    btn.innerText = dict[currentLang].vidBtnDone;
                    btn.onclick = async () => {
                        btn.disabled = true;
                        btn.innerText = "Sauvegarde...";
                        try {
                            await supabase.from('profiles').update({ 
                                video_watched: true,
                                video_completed_at: new Date().toISOString()
                            }).eq('id', session.user.id);
                            showSponsorStep();
                        } catch(err) {
                            alert("Erreur de sauvegarde");
                            btn.disabled = false;
                            btn.innerText = dict[currentLang].vidBtnDone;
                        }
                    };
                }
            }, 1000);
        }

        function showSponsorStep() {
            updateSteps(3);
            document.getElementById('video-section').classList.add('hidden');
            document.getElementById('link-section').classList.remove('hidden');
        }

        function openSponsorLink() { window.open(`https://victory-monde.com/register?ref=${sponsor}`, '_blank'); }

        function showValidation() {
            updateSteps(4);
            document.getElementById('link-section').classList.add('hidden');
            document.getElementById('val-section').classList.remove('hidden');
        }

        async function finalValidation() {
            const link = document.getElementById('v-link').value.trim();
            const msg = document.getElementById('final-msg');
            const btn = document.getElementById('btn-activate-lf');
            const t = dict[currentLang];
            
            const pattern = /^https:\/\/victory-monde\.com\/register\?ref=[a-zA-Z0-9_-]+$/;
            if (!pattern.test(link)) {
                msg.innerHTML = `<b style="color:#ff4444;">${t.valInvalid}</b>`;
                return;
            }
            
            btn.disabled = true; btn.innerText = "Activation...";
            
            try {
                const extracted = link.split('ref=')[1].split('&')[0];
                const { data, error } = await supabase
                    .from('profiles')
                    .update({ 
                        victory_link: link, 
                        victory_ref_extracted: extracted, 
                        account_activated: true 
                    })
                    .eq('id', session.user.id)
                    .select('my_ref_id')
                    .single();
                    
                if (error) throw error;
                
                const myLink = `${window.location.origin}${window.location.pathname}?ref=${data.my_ref_id}`;
                msg.innerHTML = `<div style="color:#28a745; border:1px solid #28a745; padding:10px; border-radius:8px;"><b>${t.valValid}</b><br><br><small>${t.valShare}</small><br><code style="color:#d4af37;">${myLink}</code></div>`;
            } catch (err) {
                console.error(err);
                msg.innerHTML = `<b style="color:#ff4444;">❌ Erreur serveur</b>`;
            } finally {
                btn.disabled = false; btn.innerText = t.btnActivate;
            }
        }

        function updateSteps(n) {
            for(let i=1; i<=4; i++) {
                const s = document.getElementById(`step-${i}`);
                s.className = 'step';
                if(i < n) s.classList.add('done'); else if(i === n) s.classList.add('active');
            }
        }

        // 🔄 Vérifie automatiquement la session au chargement de la page
        async function checkSession() {
            try {
                const {  { session: currentSession } } = await supabase.auth.getSession();
                if (currentSession) {
                    session = currentSession;
                    await routeUser();
                }
            } catch (err) {
                console.error("Session check failed", err);
            }
        }
    </script>
</body>
</html>
