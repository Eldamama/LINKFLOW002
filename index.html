<div class="form-box">
  <h2>🚀 Activation LINKFLOW</h2>

  <div class="notice">
    Crée un compte ou connecte-toi avant de poursuivre vers l'activation.
  </div>

  <label for="username">Pseudo utilisateur</label>
  <input type="text" id="username" placeholder="Entrez votre pseudo">

  <label for="email">Adresse email</label>
  <input type="email" id="email" placeholder="Entrez votre email">

  <label for="password">Mot de passe</label>
  <div class="password-container">
    <input type="password" id="password" placeholder="Mot de passe">
    <span class="toggle-password" onclick="togglePassword()">👁️</span>
  </div>

  <button class="btn btn-primary" onclick="sinscrire()">Inscription</button>
  <button class="btn btn-secondary" onclick="connexion()">Connexion</button>
  <button class="btn btn-secondary" onclick="logout()">Déconnexion</button>

  <div class="forgot">
    <a onclick="resetPassword()">Mot de passe oublié ?</a>
  </div>

  <div id="user-info" class="hidden"></div>
</div>
