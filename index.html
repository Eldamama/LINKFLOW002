<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINK FLOW</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
<h2 id="appName">LINK FLOW</h2>

<div id="notification"></div>

<div id="authSection">
<input type="email" id="emailInput" placeholder="Email">
<input type="password" id="mdpInput" placeholder="Mot de passe">
<button onclick="login()">Connexion</button>
<button onclick="register()">Créer compte</button>
</div>

<div id="videoSection" class="hidden">
<div id="player"></div>
</div>

<div id="claimSection" class="hidden">
<button onclick="claim()">Récupérer lien</button>
</div>

<div id="generateSection" class="hidden">
<input id="linkInput" placeholder="Ton lien">
<button onclick="generate()">Générer</button>
<p id="result"></p>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
