<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LINK FLOW - Propulsion Automatique</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --primary: #2563eb;
            --secondary: #00d2ff;
            --bg: #0c0f1a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
            text-align: center;
        }

        #appName {
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            text-align: center;
            margin: 0;
            font-weight: bold;
        }

        .slogan {
            text-align: center;
            font-size: 0.9rem;
            color: var(--secondary);
            margin-bottom: 20px;
            font-style: italic;
        }

        /* Notifications */
        #notification {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            text-align: center;
            display: none; /* Caché par défaut */
        }

        .info { background: rgba(37, 99, 235, 0.2); border: 1px solid var(--primary); color: #fff; }
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: #ffbaba; }
        .success-box { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--success); color: #b7ffd0; }

        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        .input-group { position: relative; width: 100%; }
        .eye-icon { position: absolute; right: 15px; top: 22px; cursor: pointer; color: var(--secondary); z-index: 10; }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:disabled { background: #475569; opacity: 0.5; cursor: not-allowed; }

        /* VIDEO & OVERLAY */
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 15px; 
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            cursor: pointer;
            background: rgba(0,0,0,0);
        }

        .forgot-link { display: block; font-size: 0.8rem; margin-top: 12px; color: var(--secondary); text-decoration: none; cursor: pointer; }
        #generatorSection, #actionsSection, #btnDeconnect, #resultBox { display: none; }
        #status { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="appName">LINK FLOW</h1>
        <p class="slogan">Propulsion Virale & Duplication Massive</p>
        
        <div id="status">Chargement du système...</div>
        
        <div id="notification"></div>

        <div id="authSection">
            <input type="email" id="emailInput" placeholder="Email">
            <div class="input-group">
                <input type="password" id="mdpInput" placeholder="Mot de passe">
                <span class="eye-icon" onclick="toggleMdp()">👁️</span>
            </div>
            <button onclick="connecter()">SE CONNECTER</button>
            <a class="forgot-link" onclick="recupererMdp()">Mot de passe oublié ?</a>
            <button style="background:none; border: 1px solid #334155; margin-top:20px;" onclick="inscrire()">Créer un compte partenaire</button>
        </div>

        <div id="generatorSection">
            <p style="font-size:0.9rem; margin-bottom:5px;">Collez votre lien Victory Automatic :</p>
            <input type="text" id="v_link_input" placeholder="https://victoryautomatic.com/...">
            <button id="btnGenerate" onclick="generateLink()">ACTIVER MON LIEN VIRAL</button>
            
            <div id="resultBox" class="success-box" style="margin-top:15px; padding:15px; border-radius:10px;">
                <p style="font-size:0.75rem; margin:0 0 5px 0;">Copiez votre lien de propulsion :</p>
                <code id="displayLink" style="font-weight:bold; color:#fff; word-break:break-all; font-size:0.9rem;"></code>
            </div>
        </div>

        <div id="actionsSection">
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
            <p style="font-size:0.85rem; color:var(--secondary);">Étape 1 : Cliquez sur la vidéo pour lancer la propulsion</p>
            
            <div class="video-container">
                <div id="cover" class="video-overlay" onclick="activerVideo()"></div>
                <div id="player"></div>
            </div>
            
            <button id="verifyBtn" style="background: #1e293b; border: 1px solid var(--primary);" onclick="verifierAcces()">VÉRIFIER L'ACCÈS</button>
        </div>

        <button id="finalLinkBtn" class="success-box" style="display:none; background: var(--success); color:white;" onclick="ouvrirInscription()">🚀 S'INSCRIRE DANS LE RÉSEAU</button>

        <button id="btnDeconnect" style="background:none; border:none; color:#64748b; margin-top:30px; font-size:0.8rem;" onclick="deconnecter()">DÉCONNEXION</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        var SYSTEME_ARRETE = false; 

        var firebaseConfig = {
            apiKey: "AIzaSyDgBD9NrGaUU92l7vBadVyENH_rby8zZ-w",
            authDomain: "linkflow-7a82a.firebaseapp.com",
            databaseURL: "https://linkflow-7a82a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "linkflow-7a82a",
            storageBucket: "linkflow-7a82a.firebasestorage.app",
            messagingSenderId: "459654757296",
            appId: "1:459654757296:web:d6e2609d19d3d7f4a7b475"
        };
        firebase.initializeApp(firebaseConfig);

        let interactionFaite = false;
        let lienInscription = "";

        // UI Helpers
        function showNotify(text, type) {
            const n = document.getElementById("notification");
            n.innerText = text;
            n.className = type; 
            n.style.display = "block";
        }

        function toggleMdp() {
            const m = document.getElementById("mdpInput");
            m.type = m.type === "password" ? "text" : "password";
        }

        // Logic
        function connecter() {
            const e = document.getElementById("emailInput").value.trim();
            const m = document.getElementById("mdpInput").value;
            firebase.auth().signInWithEmailAndPassword(e, m).catch(err => showNotify(err.message, "error"));
        }

        function inscrire() {
            const e = document.getElementById("emailInput").value.trim();
            const m = document.getElementById("mdpInput").value;
            firebase.auth().createUserWithEmailAndPassword(e, m).catch(err => showNotify(err.message, "error"));
        }

        function recupererMdp() {
            const e = document.getElementById("emailInput").value.trim();
            if(!e) return showNotify("Entrez votre email", "info");
            firebase.auth().sendPasswordResetEmail(e).then(() => showNotify("Email envoyé !", "success-box"));
        }

        function deconnecter() { firebase.auth().signOut().then(() => location.reload()); }

        firebase.auth().onAuthStateChanged(user => {
            if (SYSTEME_ARRETE) {
                showNotify("MAINTENANCE EN COURS", "error");
                document.getElementById("authSection").style.display = "none";
                return;
            }
            if (user) {
                document.getElementById("authSection").style.display = "none";
                document.getElementById("generatorSection").style.display = "block";
                document.getElementById("actionsSection").style.display = "block";
                document.getElementById("btnDeconnect").style.display = "block";
                document.getElementById("status").innerText = "SESSION ACTIVE : " + user.email;
                checkAccess(user.email);
            } else {
                document.getElementById("status").innerText = "IDENTIFICATION REQUISE";
            }
        });

        function checkAccess(email) {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref');
            if (email !== "lobongoaime@gmail.com" && !ref) {
                document.getElementById("btnGenerate").disabled = true;
                showNotify("ACCÈS RÉSEAU REQUIS", "error");
            } else if (ref) {
                lienInscription = "https://victoryautomatic.com/user/register/" + ref;
            } else {
                lienInscription = "https://victoryautomatic.com/user/register/okoningana";
            }
        }

        function generateLink() {
            const val = document.getElementById("v_link_input").value.trim();
            if(val.includes('victoryautomatic.com/user/register/')) {
                const pseudo = val.split('/').filter(Boolean).pop();
                document.getElementById("displayLink").innerText = window.location.origin + window.location.pathname + "?ref=" + pseudo;
                document.getElementById("resultBox").style.display = "block";
            } else { showNotify("Lien Victory invalide", "error"); }
        }

        // VIDEO LOGIC
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '9uPybhkqYw4',
                playerVars: { 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': function(e) { if(e.data === YT.PlayerState.ENDED) interactionFaite = true; } }
            });
        }

        function activerVideo() {
            interactionFaite = true; // On valide dès le premier clic
            document.getElementById("cover").style.display = "none";
            if (player && player.playVideo) player.playVideo();
        }

        function verifierAcces() {
            if (interactionFaite) {
                document.getElementById("actionsSection").style.display = "none";
                document.getElementById("finalLinkBtn").style.display = "block";
            } else {
                showNotify("LANCEZ LA VIDÉO", "error");
            }
        }

        function ouvrirInscription() {
            if(lienInscription) window.open(lienInscription, '_blank');
        }
    </script>
</body>
</html>
