<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKFLOW - Activation</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; border: 1px solid #334155; }
        .logo-small { width: 70px; margin-bottom: 15px; border-radius: 10px; }
        .step { display: none; } .step.active { display: block; }
        .viral-notice { background: #0c4a6e; border-left: 4px solid #38bdf8; padding: 15px; text-align: left; margin: 20px 0; font-size: 0.9em; }
        .btn { display: block; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 16px; }
        .btn-yt { background: #ef4444; color: white; }
        .btn-next { background: #0ea5e9; color: white; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <img src="logo.jpg" alt="Logo" class="logo-small">

    <div id="step1" class="step active">
        <h2 id="t-propulse">🚀 Propulse ton Business</h2>
        <div id="t-notice" class="viral-notice">YouTube surveille ton interaction. Like et commente pour le <b>"Signal de Feu"</b> 🔥.</div>
        <button class="btn btn-next" id="t-btn-next" onclick="nextStep(2)">J'AI PROPULSÉ !</button>
        <a href="https://www.youtube.com/watch?v=9uPybhkqYw4" target="_blank" class="btn btn-yt" id="t-btn-yt">Like & Commente ici</a>
    </div>

    <div id="step2" class="step">
        <h2 id="t-final">Activation / Connexion</h2>
        <input type="text" id="my_user" placeholder="User Name">
        <input type="url" id="v_link" placeholder="Lien Victory (Racine OKONINGANA)">
        <button class="btn btn-next" id="t-btn-act" onclick="activer()">Accéder à mon lien</button>
    </div>

    <div id="step3" class="step">
        <div style="background: #064e3b; color: #34d399; padding: 20px; border-radius: 10px;">
            <h3 id="t-valid">Validé ! 🎉</h3>
            <p id="t-share">Lien de recrutement :</p>
            <div id="final_url" style="background: #0f172a; padding: 15px; border-radius: 8px; word-break: break-all; font-weight: bold; color: #38bdf8;"></div>
        </div>
    </div>
</div>

<script>
    const trans = {
        fr: { propulse: "🚀 Propulse ton Business", next: "J'AI PROPULSÉ !", yt: "Like & Commente ici", final: "Activation / Connexion", act: "Accéder à mon lien", valid: "Validé ! 🎉", share: "Lien de recrutement :" },
        en: { propulse: "🚀 Boost your Business", next: "I BOOSTED IT!", yt: "Like & Comment here", final: "Activation / Login", act: "Access my link", valid: "Validated! 🎉", share: "Recruitment link:" },
        sw: { propulse: "🚀 Imarisha Biashara", next: "NIMEIMARISHA!", yt: "Like & Comment hapa", final: "Uwezeshaji / Ingia", act: "Fungua kiungo changu", valid: "Imethibitishwa! 🎉", share: "Kiungo chako:" },
        ln: { propulse: "🚀 Tombola Business", next: "NASALI YANGO!", yt: "Sala Like na Commente", final: "Fungola / Kota awa", act: "Kota na lien na ngai", valid: "Esimbi mpenza ! 🎉", share: "Lien na yo :" },
        es: { propulse: "🚀 Impulsa tu Negocio", next: "¡LO IMPULSÉ!", yt: "Like y Comentar aquí", final: "Activación / Login", act: "Acceder a mi enlace", valid: "¡Validado! 🎉", share: "Tu enlace:" },
        pt: { propulse: "🚀 Impulsione seu Negócio", next: "EU IMPULSIONEI!", yt: "Curtir e Comentar aqui", final: "Ativação / Login", act: "Aceder ao meu link", valid: "Validado! 🎉", share: "Seu link:" }
    };

    const userLang = localStorage.getItem('linkflow_lang') || 'fr';
    const text = trans[userLang] || trans['fr'];

    document.getElementById('t-propulse').innerText = text.propulse;
    document.getElementById('t-btn-next').innerText = text.next;
    document.getElementById('t-btn-yt').innerText = text.yt;
    document.getElementById('t-final').innerText = text.final;
    document.getElementById('t-btn-act').innerText = text.act;
    document.getElementById('t-valid').innerText = text.valid;
    document.getElementById('t-share').innerText = text.share;

    function nextStep(s) {
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
    }

    const _supabase = supabase.createClient("https://xkyynzbbatglctgdtqyu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhreXluemJiYXRnbGN0Z2R0cXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDI0NDEsImV4cCI6MjA5MjIxODQ0MX0.yUJc7P2zkYCb1ub2IPwKPUM1duIaVwGsBmfa4TVIvPc");

    async function activer() {
        const user = document.getElementById('my_user').value.trim().toLowerCase().replace(/\s/g, '');
        const link = document.getElementById('v_link').value.trim();
        
        // Si l'utilisateur remplit le lien, on met à jour, sinon on vérifie juste s'il existe
        if(link && !link.includes("okoningana")) { alert("Racine incorrecte"); return; }
        
        const { data, error } = await _supabase.from('users').select('*').eq('ref_code', user).single();
        
        if (error || !data) { alert("Utilisateur inconnu / User not found"); return; }

        if(link) { 
            await _supabase.from('users').update({ victory_link: link, is_active: true }).eq('ref_code', user);
        }

        document.getElementById('final_url').innerText = "https://eldamama.github.io/LINKFLOW002/?ref=" + user;
        nextStep(3);
    }
</script>
</body>
</html>
