<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKFLOW - Activation</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; border: 1px solid #334155; }
        .logo-small { width: 60px; margin-bottom: 10px; }
        .step { display: none; } .step.active { display: block; }
        .viral-notice { background: #0c4a6e; border-left: 4px solid #38bdf8; padding: 15px; text-align: left; margin: 20px 0; font-size: 0.85em; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-yt { background: #ef4444; color: white; }
        .btn-next { background: #0ea5e9; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <img src="logo.jpg" alt="Logo" class="logo-small">

    <div id="step1" class="step active">
        <h2 id="t-propulse">🚀 Propulse ton Business</h2>
        <div id="t-notice" class="viral-notice">
            YouTube surveille ton interaction. Like et commente pour le <b>"Signal de Feu"</b> 🔥. La vidéo deviendra virale pour toi !
        </div>
        <button class="btn btn-next" id="t-btn-next" onclick="nextStep(2)">OUI, j'ai propulsé !</button>
        <a href="https://www.youtube.com/watch?v=9uPybhkqYw4" target="_blank" class="btn btn-yt" id="t-btn-yt">Action : Like & Commente</a>
    </div>

    <div id="step2" class="step">
        <h2 id="t-final">Finalise ton Activation</h2>
        <input type="text" id="my_user" placeholder="User Name">
        <input type="url" id="v_link" placeholder="Lien Victory Automatic">
        <button class="btn btn-next" id="t-btn-act" onclick="activer()">Activer mon lien</button>
    </div>

    <div id="step3" class="step">
        <h3 id="t-valid">C'est validé ! 🎉</h3>
        <div id="final_url" style="background: #0f172a; padding: 15px; border-radius: 8px; word-break: break-all; color: #38bdf8; font-weight: bold;"></div>
    </div>
</div>

<script>
    const trans = {
        fr: { propulse: "🚀 Propulse ton Business", notice: "YouTube surveille ton interaction. Like et commente pour le Signal de Feu 🔥.", next: "OUI, j'ai propulsé !", yt: "Action : Like & Commente", final: "Finalise ton Activation", act: "Activer mon lien", valid: "C'est validé ! 🎉" },
        ln: { propulse: "🚀 Tombola Business na yo", notice: "YouTube ezali kotala yo. Sala Like mpe Commente mpo na Signal ya Moto 🔥.", next: "IYO, nasali yango !", yt: "Action : Sala Like na Commente", final: "Silisa Activation na yo", act: "Fungola lien na ngai", valid: "Esimbi mpenza ! 🎉" },
        en: { propulse: "🚀 Boost your Business", notice: "YouTube tracks interaction. Like and comment for the Fire Signal 🔥.", next: "YES, I boosted it!", yt: "Action: Like & Comment", final: "Finalize Activation", act: "Activate my link", valid: "It's validated! 🎉" }
        // On peut ajouter es, pt, sw ici sur le même modèle
    };

    const userLang = localStorage.getItem('linkflow_lang') || 'fr';
    const text = trans[userLang] || trans['fr'];

    document.getElementById('t-propulse').innerText = text.propulse;
    document.getElementById('t-notice').innerText = text.notice;
    document.getElementById('t-btn-next').innerText = text.next;
    document.getElementById('t-btn-yt').innerText = text.yt;
    document.getElementById('t-final').innerText = text.final;
    document.getElementById('t-btn-act').innerText = text.act;
    document.getElementById('t-valid').innerText = text.valid;

    function nextStep(s) {
        document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
    }

    const _supabase = supabase.createClient("https://xkyynzbbatglctgdtqyu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhreXluemJiYXRnbGN0Z2R0cXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDI0NDEsImV4cCI6MjA5MjIxODQ0MX0.yUJc7P2zkYCb1ub2IPwKPUM1duIaVwGsBmfa4TVIvPc");

    async function activer() {
        const user = document.getElementById('my_user').value.trim().toLowerCase();
        const link = document.getElementById('v_link').value.trim();
        if(!link.includes("okoningana")) { alert("Lien non valide"); return; }
        
        await _supabase.from('users').update({ victory_link: link, is_active: true }).eq('ref_code', user);
        document.getElementById('final_url').innerText = "https://eldamama.github.io/LINKFLOW002/?ref=" + user;
        nextStep(3);
    }
</script>
</body>
</html>
